<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b6b3a">
  <title>Đang ngoại tuyến - Quản lý Nhân khẩu Thôn 09</title>
  <style>
    :root { --app-font-family: Arial, Roboto, "Segoe UI", "Helvetica Neue", "Noto Sans", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: #eef3f8; color: #172033; font-family: var(--app-font-family); }
    main { width: min(460px, 100%); padding: 26px; border: 1px solid #d8e0ea; border-radius: 18px; background: #fff; box-shadow: 0 24px 70px rgba(15,23,42,.12); text-align: center; }
    .mark { width: 92px; height: 92px; margin: 0 auto 18px; border-radius: 50%; display: grid; place-items: center; border: 3px solid #f0c344; color: #0b6b3a; font-size: 30px; font-weight: 900; }
    h1 { margin: 0 0 10px; color: #0b6b3a; font-size: 22px; }
    p { margin: 0; color: #667085; line-height: 1.55; }
    a, button { margin-top: 20px; min-height: 42px; border: 0; border-radius: 10px; padding: 0 18px; display: inline-flex; align-items: center; justify-content: center; background: #0b6b3a; color: #fff; font: inherit; font-weight: 800; text-decoration: none; cursor: pointer; }
  </style>
</head>
<body>
  <main>
    <div class="mark">09</div>
    <h1>Đang ngoại tuyến</h1>
    <p>Không thể kết nối Internet. Các màn hình và dữ liệu đã mở trước đó vẫn có thể xem trong ứng dụng khi bộ nhớ ngoại tuyến còn hiệu lực.</p>
    <button type="button" onclick="location.reload()">Thử kết nối lại</button>
  </main>
</body>
</html>
