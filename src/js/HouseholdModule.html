<script>
(function() {
  var state = { page: 1, pageSize: 20, keyword: '', status: '' };
  var fields = [
    { name: 'householdCode', label: 'Mã hộ', required: true },
    { name: 'headCitizenName', label: 'Tên chủ hộ', required: true },
    { name: 'address', label: 'Địa chỉ/Thôn', required: true },
    { name: 'phone', label: 'Số điện thoại' },
    { name: 'areaCode', label: 'Khu vực' },
    { name: 'memberCount', label: 'Số nhân khẩu', type: 'number' },
    { name: 'meritoriousFamily', label: 'Gia đình có công', type: 'select', options: ['Không', 'Có'] },
    { name: 'poorHousehold', label: 'Hộ nghèo', type: 'select', options: ['Không', 'Có'] },
    { name: 'nearPoorHousehold', label: 'Hộ cận nghèo', type: 'select', options: ['Không', 'Có'] },
    { name: 'disabledHousehold', label: 'Hộ có người tàn tật', type: 'select', options: ['Không', 'Có'] },
    { name: 'status', label: 'Trạng thái', type: 'select', options: [{ value: 'ACTIVE', label: 'Đang hoạt động' }, { value: 'INACTIVE', label: 'Tạm ngưng' }] },
    { name: 'note', label: 'Ghi chú', type: 'textarea' }
  ];

  function el(id) { return document.getElementById(id); }
  function html(value) {
    return String(value === undefined || value === null ? '' : value).replace(/[&<>"]/g, function(s) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[s];
    });
  }
  function pick(row, keys) {
    for (var i = 0; i < keys.length; i += 1) {
      if (row && row[keys[i]] !== undefined && row[keys[i]] !== null && row[keys[i]] !== '') return row[keys[i]];
    }
    return '';
  }
  function debounce(fn, wait) {
    var timer;
    return function() {
      var self = this;
      var args = arguments;
      clearTimeout(timer);
      timer = setTimeout(function() { fn.apply(self, args); }, wait);
    };
  }
  function call(action, payload) {
    return new Promise(function(resolve, reject) {
      google.script.run.withSuccessHandler(function(response) {
        if (!response) return reject(new Error('Không nhận được phản hồi từ hệ thống'));
        if (response.ok === false) return reject(new Error(response.error && response.error.message ? response.error.message : 'Thao tác không thành công'));
        resolve(response.data !== undefined ? response.data : response);
      }).withFailureHandler(function(error) {
        reject(new Error(error && error.message ? error.message : 'Lỗi hệ thống'));
      }).api(action, payload || {});
    });
  }
  function toast(message, type) {
    var box = document.createElement('div');
    box.className = 'alert alert-' + (type || 'info') + ' position-fixed';
    box.style.cssText = 'right:16px;top:72px;z-index:2000;min-width:260px;box-shadow:0 10px 25px rgba(0,0,0,.16)';
    box.textContent = message;
    document.body.appendChild(box);
    setTimeout(function() { box.remove(); }, 3500);
  }
  function pageData(result) {
    result = result || {};
    var items = Array.isArray(result.items) ? result.items : [];
    var pageSize = Number(result.pageSize || state.pageSize || 20);
    var total = Number(result.total || items.length || 0);
    return {
      items: items,
      page: Number(result.page || state.page || 1),
      pageSize: pageSize,
      total: total,
      totalPages: Number(result.totalPages || Math.max(1, Math.ceil(total / pageSize)))
    };
  }
  function readFilters() {
    if (el('householdKeyword2')) state.keyword = el('householdKeyword2').value.trim();
    if (el('householdStatus2')) state.status = el('householdStatus2').value;
    if (el('householdPageSize2')) state.pageSize = parseInt(el('householdPageSize2').value, 10) || 20;
    return Object.assign({}, state, { search: state.keyword, q: state.keyword });
  }
  function runSearch() {
    readFilters();
    state.page = 1;
    refresh();
  }
  function activeMenu() {
    document.querySelectorAll('[data-route]').forEach(function(item) {
      item.classList.toggle('active', item.getAttribute('data-route') === 'household');
    });
    if (el('pageTitle')) el('pageTitle').textContent = 'Hộ dân';
  }
  function normalizeText(value) {
    return String(value === undefined || value === null ? '' : value).trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }
  function isYes(value) {
    var normalized = normalizeText(value);
    return value === true || value === 1 || normalized === 'co' || normalized === 'yes' || normalized === 'true' || normalized === '1' || normalized === 'x';
  }
  function policyValue(row, canonicalName, legacyName) {
    return pick(row, [canonicalName, legacyName]);
  }
  function policyLabels(row) {
    var labels = [];
    if (isYes(policyValue(row, 'meritoriousFamily', 'isPolicyFamily'))) labels.push('Gia đình có công');
    if (isYes(policyValue(row, 'poorHousehold', 'isPoorHousehold'))) labels.push('Hộ nghèo');
    if (isYes(policyValue(row, 'nearPoorHousehold', 'isNearPoorHousehold'))) labels.push('Hộ cận nghèo');
    if (isYes(policyValue(row, 'disabledHousehold', 'hasDisabledMember'))) labels.push('Tàn tật');
    return labels.length ? labels.map(function(label) { return '<span class="badge badge-info mr-1">' + html(label) + '</span>'; }).join('') : '<span class="text-muted">Không</span>';
  }
  function statusBadge(value) {
    return value === 'INACTIVE' ? '<span class="badge badge-secondary">Tạm ngưng</span>' : '<span class="badge badge-success">Đang hoạt động</span>';
  }
  function yearOf(value) {
    var match = String(value || '').match(/(19|20)\d{2}/);
    return match ? match[0] : '';
  }
  function render() {
    activeMenu();
    closeMemberModal(true);
    el('app').innerHTML = '<div class="module-toolbar"><div class="filters">'
      + '<input id="householdKeyword2" class="form-control" placeholder="Tìm mã hộ, chủ hộ, địa chỉ/thôn, diện hộ">'
      + '<select id="householdStatus2" class="form-control"><option value="">Tất cả trạng thái</option><option value="ACTIVE">Đang hoạt động</option><option value="INACTIVE">Tạm ngưng</option></select>'
      + '<select id="householdPageSize2" class="form-control"><option>10</option><option selected>20</option><option>50</option><option>100</option></select>'
      + '<button class="btn btn-outline-primary" id="householdSearch" title="Tìm kiếm"><i class="fas fa-search"></i></button>'
      + '<button class="btn btn-outline-secondary" id="householdClearSearch" title="Xóa tìm kiếm"><i class="fas fa-times"></i></button>'
      + '</div><div class="actions"><button class="btn btn-primary btn-sm btn-material" id="householdCreate"><i class="fas fa-plus"></i> Thêm hộ</button></div></div><div id="householdGrid"></div>';
    el('householdKeyword2').value = state.keyword;
    el('householdStatus2').value = state.status;
    el('householdPageSize2').value = state.pageSize;
    el('householdCreate').onclick = function() { openForm('Thêm hộ dân', {}, createRow); };
    el('householdSearch').onclick = runSearch;
    el('householdClearSearch').onclick = function() { el('householdKeyword2').value = ''; runSearch(); };
    el('householdKeyword2').oninput = debounce(runSearch, 350);
    el('householdKeyword2').onkeydown = function(event) { if (event.key === 'Enter') { event.preventDefault(); runSearch(); } };
    el('householdStatus2').onchange = runSearch;
    el('householdPageSize2').onchange = runSearch;
    refresh();
  }
  function refresh() {
    var grid = el('householdGrid');
    if (!grid) return;
    grid.innerHTML = '<div class="text-muted p-3">Đang tải danh sách hộ dân...</div>';
    call('household.page', readFilters()).then(function(result) {
      var page = pageData(result);
      if (!page.items.length) {
        grid.innerHTML = '<div class="alert alert-info">Chưa có hộ dân phù hợp.</div>' + pager(page);
        bindPager(page);
        return;
      }
      grid.innerHTML = '<div class="table-responsive"><table class="table table-hover table-striped bg-white"><thead><tr>'
        + '<th>Mã hộ</th><th>Chủ hộ</th><th>Địa chỉ/Thôn</th><th>Điện thoại</th><th>Khu vực</th><th>Nhân khẩu</th><th>Diện hộ</th><th>Trạng thái</th><th class="text-right">Thao tác</th>'
        + '</tr></thead><tbody>' + page.items.map(function(row, index) {
          return '<tr data-household-row="' + index + '" style="cursor:pointer">'
            + '<td><strong>' + html(row.householdCode) + '</strong></td><td>' + html(row.headCitizenName) + '</td><td>' + html(row.address) + '</td><td>' + html(row.phone) + '</td>'
            + '<td>' + html(row.areaCode) + '</td><td>' + html(row.memberCount || 0) + '</td><td>' + policyLabels(row) + '</td><td>' + statusBadge(row.status) + '</td>'
            + '<td class="text-right text-nowrap"><button class="btn btn-outline-info btn-xs mr-1" title="Xem thành viên" data-view-household="' + index + '"><i class="fas fa-eye"></i></button>'
            + '<button class="btn btn-outline-primary btn-xs mr-1" title="Sửa" data-edit-household="' + index + '"><i class="fas fa-pen"></i></button>'
            + '<button class="btn btn-outline-danger btn-xs" title="Xóa" data-delete-household="' + index + '"><i class="fas fa-trash"></i></button></td></tr>';
        }).join('') + '</tbody></table></div>' + pager(page);
      bindRows(page.items);
      bindPager(page);
    }).catch(function(error) {
      grid.innerHTML = '<div class="alert alert-danger">Không tải được danh sách hộ dân: ' + html(error.message) + '</div>';
    });
  }
  function pager(page) {
    return '<div class="d-flex justify-content-between align-items-center mt-3 flex-wrap"><div class="text-muted">Tổng cộng ' + html(page.total) + ' hộ dân</div><div class="btn-group btn-group-sm">'
      + '<button class="btn btn-outline-secondary" id="householdPrev" ' + (page.page <= 1 ? 'disabled' : '') + '><i class="fas fa-chevron-left"></i></button>'
      + '<button class="btn btn-outline-secondary" disabled>Trang ' + html(page.page) + '/' + html(page.totalPages) + '</button>'
      + '<button class="btn btn-outline-secondary" id="householdNext" ' + (page.page >= page.totalPages ? 'disabled' : '') + '><i class="fas fa-chevron-right"></i></button></div></div>';
  }
  function bindPager(page) {
    if (el('householdPrev')) el('householdPrev').onclick = function() { if (state.page > 1) { state.page -= 1; refresh(); } };
    if (el('householdNext')) el('householdNext').onclick = function() { if (state.page < page.totalPages) { state.page += 1; refresh(); } };
  }
  function bindRows(items) {
    document.querySelectorAll('[data-household-row]').forEach(function(row) {
      row.onclick = function(event) {
        if (event.target.closest('button')) return;
        showMembers(items[Number(row.getAttribute('data-household-row'))]);
      };
    });
    document.querySelectorAll('[data-view-household]').forEach(function(btn) { btn.onclick = function(event) { event.stopPropagation(); showMembers(items[Number(btn.dataset.viewHousehold)]); }; });
    document.querySelectorAll('[data-edit-household]').forEach(function(btn) { btn.onclick = function(event) { event.stopPropagation(); openForm('Cập nhật hộ dân', items[Number(btn.dataset.editHousehold)], updateRow); }; });
    document.querySelectorAll('[data-delete-household]').forEach(function(btn) {
      btn.onclick = function(event) {
        event.stopPropagation();
        var row = items[Number(btn.dataset.deleteHousehold)];
        if (!confirm('Xác nhận xóa mềm hộ dân này?')) return;
        call('household.delete', { id: row.id }).then(function() { toast('Đã xóa hộ dân', 'success'); refresh(); }).catch(function(error) { toast(error.message, 'danger'); });
      };
    });
  }
  function showMembers(household) {
    var code = pick(household, ['householdCode', 'id']);
    if (!code) return toast('Hộ dân chưa có mã hộ để tra cứu thành viên', 'warning');
    memberModal(household, '<div class="text-muted p-3">Đang tải danh sách thành viên...</div>');
    call('person.safePage', { page: 1, pageSize: 100, householdId: code, householdCode: household.householdCode || code }).then(function(result) {
      var members = pageData(result).items;
      var body = '<div class="mb-2 text-muted">Mã hộ: <strong>' + html(code) + '</strong> - ' + html(members.length) + ' thành viên</div>';
      if (!members.length) {
        body += '<div class="alert alert-info">Chưa có nhân khẩu nào trùng mã hộ này.</div>';
      } else {
        body += '<div class="table-responsive"><table class="table table-sm table-striped table-hover"><thead><tr><th>Mã hộ</th><th>Mã nhân khẩu</th><th>Họ tên</th><th>Năm sinh</th><th>CCCD</th><th>Địa chỉ</th><th>Số điện thoại</th></tr></thead><tbody>'
          + members.map(function(person) {
            return '<tr><td>' + html(pick(person, ['householdCode', 'householdId']) || code) + '</td><td>' + html(pick(person, ['citizenCode', 'personCode', 'id'])) + '</td><td>' + html(pick(person, ['fullName', 'name'])) + '</td><td>' + html(yearOf(pick(person, ['dateOfBirth', 'birthDate', 'birthYear']))) + '</td><td>' + html(pick(person, ['identityNumber', 'cccd', 'nationalId'])) + '</td><td>' + html(pick(person, ['currentAddress', 'permanentAddress', 'address']) || household.address) + '</td><td>' + html(pick(person, ['phone', 'phoneNumber', 'mobile'])) + '</td></tr>';
          }).join('') + '</tbody></table></div>';
      }
      memberModal(household, body);
    }).catch(function(error) {
      memberModal(household, '<div class="alert alert-danger">Không tải được thành viên hộ: ' + html(error.message) + '</div>');
    });
  }
  function cleanupMemberModal() {
    var modal = el('householdMemberModal');
    if (modal) modal.remove();
    if (window.jQuery) {
      $('.modal-backdrop').remove();
      if (!$('.modal.show').length) $('body').removeClass('modal-open').css('padding-right', '');
    }
  }
  function closeMemberModal(force) {
    var modal = el('householdMemberModal');
    if (!modal) return;
    if (window.jQuery && !force) {
      $('#householdMemberModal').modal('hide');
      return;
    }
    cleanupMemberModal();
  }
  function bindMemberModalClose() {
    document.querySelectorAll('[data-household-member-close]').forEach(function(btn) {
      btn.onclick = function(event) {
        event.preventDefault();
        closeMemberModal(false);
      };
    });
  }
  function memberModal(household, body) {
    var code = pick(household, ['householdCode', 'id']);
    var modal = el('householdMemberModal');
    if (modal) {
      var title = modal.querySelector('.modal-title');
      var modalBody = modal.querySelector('.modal-body');
      if (title) title.innerHTML = 'Thành viên hộ ' + html(code);
      if (modalBody) modalBody.innerHTML = body;
      bindMemberModalClose();
      if (window.jQuery && !modal.classList.contains('show')) $('#householdMemberModal').modal('show');
      return;
    }
    document.body.insertAdjacentHTML('beforeend', '<div class="modal fade" id="householdMemberModal" tabindex="-1" role="dialog" aria-modal="true"><div class="modal-dialog modal-xl" role="document"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Thành viên hộ ' + html(code) + '</h5><button type="button" class="close" data-household-member-close aria-label="Đóng"><span>&times;</span></button></div><div class="modal-body">' + body + '</div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-household-member-close>Đóng</button></div></div></div></div>');
    bindMemberModalClose();
    if (window.jQuery) {
      $('#householdMemberModal').on('hidden.bs.modal', cleanupMemberModal).modal({ backdrop: true, keyboard: true, show: true });
    }
  }
  function control(field, data) {
    var value = data[field.name];
    if ((value === undefined || value === null || value === '') && field.name === 'meritoriousFamily') value = data.isPolicyFamily;
    if ((value === undefined || value === null || value === '') && field.name === 'poorHousehold') value = data.isPoorHousehold;
    if ((value === undefined || value === null || value === '') && field.name === 'nearPoorHousehold') value = data.isNearPoorHousehold;
    if ((value === undefined || value === null || value === '') && field.name === 'disabledHousehold') value = data.hasDisabledMember;
    if (value === undefined || value === null || value === '') value = field.name === 'status' ? 'ACTIVE' : '';
    if (field.type === 'textarea') return '<textarea class="form-control" name="' + field.name + '" rows="3">' + html(value) + '</textarea>';
    if (field.type === 'select') return '<select class="form-control" name="' + field.name + '">' + field.options.map(function(option) {
      var optionValue = typeof option === 'object' ? option.value : option;
      var optionLabel = typeof option === 'object' ? option.label : option;
      return '<option value="' + html(optionValue) + '" ' + (String(optionValue) === String(value) ? 'selected' : '') + '>' + html(optionLabel) + '</option>';
    }).join('') + '</select>';
    return '<input class="form-control" type="' + html(field.type || 'text') + '" name="' + field.name + '" value="' + html(value) + '">';
  }
  function openForm(title, data, submitter) {
    if (el('householdFormModal')) el('householdFormModal').remove();
    document.body.insertAdjacentHTML('beforeend', '<div class="modal fade" id="householdFormModal" tabindex="-1" role="dialog"><div class="modal-dialog modal-lg" role="document"><form class="modal-content" id="householdForm"><div class="modal-header"><h5 class="modal-title">' + html(title) + '</h5><button type="button" class="close" data-dismiss="modal"><span>&times;</span></button></div><div class="modal-body"><div class="form-grid">' + fields.map(function(field) {
      return '<div class="form-group ' + (field.type === 'textarea' ? 'full' : '') + '"><label>' + html(field.label) + (field.required ? ' <span class="text-danger">*</span>' : '') + '</label>' + control(field, data || {}) + '</div>';
    }).join('') + '</div></div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-dismiss="modal">Hủy</button><button type="submit" class="btn btn-primary">Lưu</button></div></form></div></div>');
    el('householdForm').onsubmit = function(event) {
      event.preventDefault();
      var payload = {};
      fields.forEach(function(field) { payload[field.name] = el('householdForm').elements[field.name].value; });
      if (data && data.id) payload.id = data.id;
      try { validate(payload); } catch (error) { toast(error.message, 'warning'); return; }
      submitter(payload);
    };
    $('#householdFormModal').modal('show');
  }
  function validate(payload) {
    if (!String(payload.householdCode || '').trim()) throw new Error('Vui lòng nhập Mã hộ');
    if (!String(payload.headCitizenName || '').trim()) throw new Error('Vui lòng nhập Tên chủ hộ');
    if (!String(payload.address || '').trim()) throw new Error('Vui lòng nhập Địa chỉ/Thôn');
  }
  function createRow(payload) {
    call('household.create', payload).then(function() { $('#householdFormModal').modal('hide'); state.page = 1; toast('Đã thêm hộ dân', 'success'); refresh(); }).catch(function(error) { toast(error.message, 'danger'); });
  }
  function updateRow(payload) {
    call('household.update', payload).then(function() { $('#householdFormModal').modal('hide'); toast('Đã cập nhật hộ dân', 'success'); refresh(); }).catch(function(error) { toast(error.message, 'danger'); });
  }
  document.addEventListener('click', function(event) {
    var link = event.target.closest('[data-route="household"]');
    if (!link) return;
    event.preventDefault();
    event.stopImmediatePropagation();
    render();
  }, true);
  window.Thon09HouseholdModule = { render: render, refresh: refresh };
})();
</script>
