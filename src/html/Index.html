<script>
(function() {
  function html(value) { return String(value === undefined || value === null ? '' : value).replace(/[&<>"]/g, function(s) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]); }); }
  function activate(route, title) {
    document.querySelectorAll('[data-route]').forEach(function(item) { item.classList.toggle('active', item.getAttribute('data-route') === route); });
    var pageTitle = document.getElementById('pageTitle');
    if (pageTitle) pageTitle.textContent = title;
  }
  document.addEventListener('click', function(event) {
    var link = event.target.closest('[data-route="settings"]');
    if (!link) return;
    event.preventDefault();
    event.stopImmediatePropagation();
    activate('settings', 'Cấu hình');
    document.getElementById('app').innerHTML = '<div class="card"><div class="card-header"><h3 class="card-title">Cấu hình hệ thống</h3></div><div class="card-body"><div class="form-grid"><div class="form-group"><label>Đơn vị quản lý</label><input class="form-control" value="' + html('xã Hồng Phong') + '" readonly></div><div class="form-group"><label>Tên thôn</label><input class="form-control" value="Thôn 09" readonly></div><div class="form-group full"><label>Tên hệ thống</label><input class="form-control" value="' + html('Quản Lý Nhân Khẩu Thôn 09 xã Hồng Phong') + '" readonly></div></div></div></div>';
  }, true);
})();
(function() {
  function showLogin(message) {
    document.body.classList.add('app-locked');
    document.body.classList.remove('app-authenticated');
    sessionStorage.removeItem('thon09Authenticated');
    var box = document.getElementById('loginMessage');
    if (box) box.textContent = message || '';
  }
  function showApp() {
    document.body.classList.remove('app-locked');
    document.body.classList.add('app-authenticated');
    sessionStorage.setItem('thon09Authenticated', '1');
    if (window.Thon09App && typeof window.Thon09App.start === 'function') window.Thon09App.start();
  }
  function login() {
    var button = document.getElementById('btnLogin');
    var message = document.getElementById('loginMessage');
    if (button) button.disabled = true;
    if (message) message.textContent = 'Đang kiểm tra tài khoản...';
    google.script.run.withSuccessHandler(function(response) {
      if (button) button.disabled = false;
      if (!response || !response.ok) {
        showLogin(response && response.error ? response.error.message : 'Không thể đăng nhập');
        return;
      }
      if (message) message.textContent = '';
      showApp();
    }).withFailureHandler(function(error) {
      if (button) button.disabled = false;
      showLogin(error && error.message ? error.message : 'Không thể đăng nhập');
    }).api('user.me', {});
  }
  document.getElementById('loginForm').addEventListener('submit', function(event) {
    event.preventDefault();
    login();
  });
  document.getElementById('btnLogout').addEventListener('click', function(event) {
    event.preventDefault();
    showLogin('Đã đăng xuất khỏi giao diện.');
  });
  if (sessionStorage.getItem('thon09Authenticated') === '1') login();
})();
</script>
