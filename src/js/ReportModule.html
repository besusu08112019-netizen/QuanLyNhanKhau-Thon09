<script>
(function() {
  var state = { type: 'summary', recordId: '', fromDate: '', toDate: '', householdStatus: '', personStatus: '', residencyStatus: '', movementType: '' };
  var lastRendered = null;

  function el(id) { return document.getElementById(id); }
  function html(value) { return String(value === undefined || value === null ? '' : value).replace(/[&<>"]/g, function(s) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]); }); }
  function toast(message, kind) {
    var host = document.querySelector('.toast-host') || document.body.appendChild(document.createElement('div'));
    host.className = 'toast-host';
    var node = document.createElement('div');
    node.className = 'alert alert-' + (kind || 'info') + ' shadow-sm';
    node.textContent = message;
    host.appendChild(node);
    setTimeout(function() { node.remove(); }, 3500);
  }
  function setLoading(active) {
    var layer = el('loadingLayer');
    if (!layer) {
      layer = document.createElement('div');
      layer.id = 'loadingLayer';
      layer.className = 'loading-layer';
      layer.innerHTML = '<div class="spinner-border text-primary"></div>';
      document.body.appendChild(layer);
    }
    layer.classList.toggle('active', !!active);
  }
  function call(action, payload) {
    setLoading(true);
    return new Promise(function(resolve, reject) {
      google.script.run.withSuccessHandler(function(response) {
        setLoading(false);
        if (!response || !response.ok) reject(new Error(response && response.error ? response.error.message : 'Lỗi hệ thống'));
        else resolve(response.data);
      }).withFailureHandler(function(error) {
        setLoading(false);
        reject(error);
      }).api(action, payload || {});
    });
  }
  function activateNav() {
    document.querySelectorAll('[data-route]').forEach(function(item) { item.classList.toggle('active', item.getAttribute('data-route') === 'report'); });
    var title = el('pageTitle');
    if (title) title.textContent = 'Báo cáo';
  }
  function filters() {
    state.type = el('reportType').value;
    state.recordId = el('reportRecordId').value;
    state.fromDate = el('reportFrom').value;
    state.toDate = el('reportTo').value;
    state.householdStatus = el('reportHouseholdStatus').value;
    state.personStatus = el('reportPersonStatus').value;
    state.residencyStatus = el('reportResidency').value;
    state.movementType = el('reportMovementType').value;
    return { type: state.type, filters: { recordId: state.recordId, fromDate: state.fromDate, toDate: state.toDate, householdStatus: state.householdStatus, personStatus: state.personStatus, residencyStatus: state.residencyStatus, movementType: state.movementType } };
  }
  function reportTable(report) {
    return '<div class="report-preview-header"><div><h3>' + html(report.title) + '</h3><p>Ngày xuất: ' + html(report.generatedAt) + '</p></div><div class="text-muted">' + html(report.generatedBy) + '</div></div>' +
      '<div class="report-summary-grid"><div>Tổng hộ<strong>' + html(report.summary.households || 0) + '</strong></div><div>Tổng nhân khẩu<strong>' + html(report.summary.citizens || 0) + '</strong></div><div>Nam / Nữ<strong>' + html(report.summary.male || 0) + ' / ' + html(report.summary.female || 0) + '</strong></div><div>Tạm trú / Tạm vắng<strong>' + html(report.summary.temporaryResidence || 0) + ' / ' + html(report.summary.temporaryAbsence || 0) + '</strong></div></div>' +
      '<div class="card"><div class="card-body table-responsive p-0"><table class="table table-sm table-hover mb-0"><thead><tr>' + report.columns.map(function(column) { return '<th>' + html(column) + '</th>'; }).join('') + '</tr></thead><tbody>' +
      (report.rows.length ? report.rows.map(function(row) { return '<tr>' + report.columns.map(function(_, index) { return '<td>' + html(row[index]) + '</td>'; }).join('') + '</tr>'; }).join('') : '<tr><td colspan="' + report.columns.length + '" class="text-center text-muted p-4">Không có dữ liệu</td></tr>') +
      '</tbody></table></div></div>';
  }
  function preview() {
    call('report.preview', filters()).then(function(result) {
      lastRendered = result;
      el('reportPreview').innerHTML = reportTable(result.report);
    }).catch(function(error) { toast(error.message, 'danger'); });
  }
  function printReport() {
    call('report.print', filters()).then(function(result) {
      lastRendered = result;
      var win = window.open('', '_blank');
      if (!win) { toast('Trình duyệt đang chặn cửa sổ in', 'warning'); return; }
      win.document.open();
      win.document.write(result.html);
      win.document.close();
      win.focus();
      setTimeout(function() { win.print(); }, 300);
    }).catch(function(error) { toast(error.message, 'danger'); });
  }
  function exportFile(action) {
    call(action, filters()).then(function(file) {
      toast('Đã xuất ' + file.name, 'success');
      el('reportExportResult').innerHTML = '<a target="_blank" href="' + html(file.url) + '">' + html(file.name) + '</a>';
    }).catch(function(error) { toast(error.message, 'danger'); });
  }
  function render() {
    activateNav();
    lastRendered = null;
    el('app').innerHTML = '<div class="report-workspace"><div class="report-filter"><div class="filters"><select id="reportType" class="form-control form-control-sm"><option value="summary">Báo cáo thống kê</option><option value="householdForm">Phiếu hộ gia đình</option><option value="personForm">Phiếu nhân khẩu</option><option value="household">Danh sách hộ</option><option value="population">Danh sách nhân khẩu</option><option value="gender">Theo giới tính</option><option value="age">Theo độ tuổi</option><option value="residency">Theo tình trạng cư trú</option><option value="movement">Biến động dân cư</option></select><input id="reportRecordId" class="form-control form-control-sm" placeholder="ID/Mã hộ/Mã nhân khẩu/CCCD"><input type="date" id="reportFrom" class="form-control form-control-sm"><input type="date" id="reportTo" class="form-control form-control-sm"><select id="reportHouseholdStatus" class="form-control form-control-sm"><option value="">Tất cả hộ</option><option value="ACTIVE">Hộ đang hoạt động</option><option value="INACTIVE">Hộ tạm ngưng</option></select><select id="reportPersonStatus" class="form-control form-control-sm"><option value="">Tất cả nhân khẩu</option><option value="ACTIVE">Đang hoạt động</option><option value="INACTIVE">Tạm ngưng</option><option value="DELETED">Đã xóa</option></select><select id="reportResidency" class="form-control form-control-sm"><option value="">Tất cả cư trú</option><option value="Thường trú">Thường trú</option><option value="Tạm trú">Tạm trú</option><option value="Tạm vắng">Tạm vắng</option></select><select id="reportMovementType" class="form-control form-control-sm"><option value="">Tất cả biến động</option><option value="Sinh">Sinh</option><option value="Tử">Tử</option><option value="Chuyển đến">Chuyển đến</option><option value="Chuyển đi">Chuyển đi</option></select></div><div class="actions"><button class="btn btn-outline-secondary btn-sm" id="btnReportPreview" title="Xem trước"><i class="fas fa-eye"></i></button><button class="btn btn-outline-primary btn-sm" id="btnReportPrint" title="In"><i class="fas fa-print"></i></button><button class="btn btn-outline-danger btn-sm" id="btnReportPdf" title="Xuất PDF"><i class="fas fa-file-pdf"></i></button><button class="btn btn-outline-success btn-sm" id="btnReportExcel" title="Xuất Excel"><i class="fas fa-file-excel"></i></button></div></div><div id="reportExportResult" class="mb-2"></div><div id="reportPreview"></div></div>';
    el('reportType').value = state.type;
    el('reportRecordId').value = state.recordId;
    el('reportFrom').value = state.fromDate;
    el('reportTo').value = state.toDate;
    el('reportHouseholdStatus').value = state.householdStatus;
    el('reportPersonStatus').value = state.personStatus;
    el('reportResidency').value = state.residencyStatus;
    el('reportMovementType').value = state.movementType;
    ['reportType','reportRecordId','reportFrom','reportTo','reportHouseholdStatus','reportPersonStatus','reportResidency','reportMovementType'].forEach(function(id) { el(id).onchange = function() { lastRendered = null; preview(); }; });
    el('btnReportPreview').onclick = preview;
    el('btnReportPrint').onclick = printReport;
    el('btnReportPdf').onclick = function() { exportFile('report.exportPdf'); };
    el('btnReportExcel').onclick = function() { exportFile('report.exportExcel'); };
    preview();
  }
  document.addEventListener('click', function(event) {
    var link = event.target.closest('[data-route="report"]');
    if (!link) return;
    event.preventDefault();
    event.stopImmediatePropagation();
    render();
  }, true);
})();
</script>
