name: One-shot person desktop table fix

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/person-desktop-table-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-person-table:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch person desktop table mapping
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          view = Path('views/app.php')
          app = Path('assets/js/app.js')
          view_text = view.read_text(encoding='utf-8')
          app_text = app.read_text(encoding='utf-8')

          old_head = '<thead><tr><th><input type="checkbox" id="personCheckAll"></th><th>Mã hộ</th><th>Mã nhân khẩu</th><th>Họ và tên</th><th>Ngày sinh</th><th>Giới tính</th><th>CCCD/Số định danh</th><th>Cư trú</th><th>Đảng viên</th><th class="text-end">Thao tác</th></tr></thead>'
          new_head = '<thead><tr><th><input type="checkbox" id="personCheckAll"></th><th>Mã hộ</th><th>Mã nhân khẩu</th><th>Họ và tên</th><th>Quan hệ</th><th>Ngày sinh</th><th>Tuổi</th><th>Giới tính</th><th>CCCD/Số định danh</th><th>Cư trú</th><th>Đảng viên</th><th class="text-end">Thao tác</th></tr></thead>'
          if old_head not in view_text and new_head not in view_text:
              raise SystemExit('Could not locate person table header in views/app.php')
          view_text = view_text.replace(old_head, new_head)
          view_text = view_text.replace('colspan="10" class="text-center text-muted py-4">Không có dữ liệu', 'colspan="12" class="text-center text-muted py-4">Không có dữ liệu')
          view_text = re.sub(r"assets/js/app\.js\?v=[^\"']+", 'assets/js/app.js?v=20260703-person-table-1', view_text)
          view.write_text(view_text, encoding='utf-8')

          new_person_row = r'''function personRow(row) {
  const party = Number(row.party_member || row.partyMember || 0) === 1;
  const residenceClass = row.presence_status === 'AWAY' ? 'person-badge-away' : (row.residency_status === 'TEMPORARY' ? 'person-badge-temp' : 'person-badge-home');
  const residenceText = row.presence_status === 'AWAY' ? 'Tạm vắng' : residencyLabel(row.residency_status);
  const personCode = row.person_code || row.citizen_code || '';
  const age = row.age ?? personAge(row.date_of_birth);
  const ageText = age === null || age === undefined ? '' : String(age);
  return '<tr>'
    + '<td><input type="checkbox" class="person-check" value="' + row.id + '"></td>'
    + '<td>' + escapeHtml(row.household_code || '') + '</td>'
    + '<td>' + escapeHtml(personCode) + '</td>'
    + '<td><button class="btn btn-link person-name-link" onclick="showPerson(' + row.id + ')">' + escapeHtml(row.full_name || '') + '</button></td>'
    + '<td>' + escapeHtml(personRelationship(row)) + '</td>'
    + '<td>' + formatDate(row.date_of_birth) + '</td>'
    + '<td>' + escapeHtml(ageText) + '</td>'
    + '<td>' + escapeHtml(row.gender || '') + '</td>'
    + '<td>' + escapeHtml(row.identity_number || '') + '</td>'
    + '<td><span class="person-badge ' + residenceClass + '">' + escapeHtml(residenceText) + '</span></td>'
    + '<td><span class="person-badge ' + (party ? 'person-badge-party' : 'person-badge-muted') + '">' + (party ? 'Có' : 'Không') + '</span></td>'
    + '<td class="text-end"><button class="btn btn-sm person-row-btn" onclick="showPerson(' + row.id + ')">Xem</button> <button class="btn btn-sm person-row-btn person-row-edit" onclick="openPersonForm(' + row.id + ')">Sửa</button> <button class="btn btn-sm btn-outline-danger" onclick="deletePerson(' + row.id + ')">Xóa</button></td>'
    + '</tr>';
}'''
          app_text, count = re.subn(r'function personRow\(row\) \{.*?\n\}', new_person_row, app_text, count=1, flags=re.S)
          if count != 1:
              raise SystemExit('Could not replace personRow in assets/js/app.js')
          app_text = app_text.replace('colspan="10" class="text-center text-muted py-4">Không có dữ liệu', 'colspan="12" class="text-center text-muted py-4">Không có dữ liệu')
          app.write_text(app_text, encoding='utf-8')

          workflow = Path('.github/workflows/person-desktop-table-fix.yml')
          if workflow.exists():
              workflow.unlink()
          PY
      - name: Validate JavaScript syntax
        run: node --check assets/js/app.js
      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add views/app.php assets/js/app.js .github/workflows/person-desktop-table-fix.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix person desktop table column mapping"
            git push
          fi
