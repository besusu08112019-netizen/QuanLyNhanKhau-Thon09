<script>
(function() {
  var lastPreview = null;
  var templateLists = {
    GioiTinh: ['Nam','Nữ','Khác'],
    DanToc: ['Kinh','Tày','Thái','Mường','Khmer','Hoa','Nùng','Hmong','Dao','Gia Rai','Ê Đê','Ba Na','Sán Chay','Chăm','Cơ Ho','Xơ Đăng','Sán Dìu','Hrê','Ra Glai','Mnông','Thổ','Xtiêng','Kháng','Khơ Mú','Bru-Vân Kiều','Cơ Tu','Giáy','Tà Ôi','Mạ','Giẻ Triêng','Co','Chơ Ro','Xinh Mun','Hà Nhì','Chu Ru','Lào','La Chí','La Ha','Phù Lá','La Hủ','Lự','Lô Lô','Chứt','Mảng','Pà Thẻn','Cơ Lao','Cống','Bố Y','Si La','Pu Péo','Brâu','Rơ Măm','Ơ Đu','Ngái'],
    TonGiao: ['Không','Phật giáo','Công giáo','Tin Lành','Cao Đài','Phật giáo Hòa Hảo','Hồi giáo','Bà La Môn',"Baha'i",'Bửu Sơn Kỳ Hương','Tịnh độ Cư sĩ Phật hội','Minh Sư Đạo','Minh Lý Đạo','Khác'],
    NgheNghiep: ['Chưa có việc làm','Học sinh/Sinh viên','Cán bộ/Công chức/Viên chức','Công nhân','Nông dân','Kinh doanh/Buôn bán','Lao động tự do','Giáo viên','Nhân viên văn phòng','Y tế','Kỹ sư/Kỹ thuật','Dịch vụ','Tài xế/Vận tải','Công an/Quân đội','Nội trợ','Hưu trí','Khác'],
    QuanHe: ['Chủ hộ','Vợ','Chồng','Con','Cha','Mẹ','Ông','Bà','Anh','Chị','Em','Cháu','Dâu','Rể','Người thân khác','Người thuê trọ','Tạm trú','Khác'],
    HocVan: ['Chưa đi học','Mầm non','Tiểu học','THCS','THPT','Trung cấp','Cao đẳng','Đại học','Sau đại học','Không rõ'],
    HonNhan: ['Chưa kết hôn','Đã kết hôn','Ly hôn','Ly thân','Góa','Không rõ'],
    CoKhong: ['Không','Có'],
    TrangThaiHo: ['ACTIVE','INACTIVE'],
    TrangThaiNhanKhau: ['ALIVE','DECEASED'],
    HienTai: ['AT_HOME','AWAY']
  };

  function el(id) { return document.getElementById(id); }
  function html(value) { return String(value === undefined || value === null ? '' : value).replace(/[&<>"]/g, function(s) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]); }); }
  function xml(value) { return String(value === undefined || value === null ? '' : value).replace(/[&<>"]/g, function(s) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]); }); }
  function toast(message, kind) {
    var host = document.querySelector('.toast-host') || document.body.appendChild(document.createElement('div'));
    host.className = 'toast-host';
    var node = document.createElement('div');
    node.className = 'alert alert-' + (kind || 'info') + ' shadow-sm';
    node.textContent = message;
    host.appendChild(node);
    setTimeout(function() { node.remove(); }, 3500);
  }
  function setLoading(active) {
    var layer = el('loadingLayer');
    if (!layer) {
      layer = document.createElement('div');
      layer.id = 'loadingLayer';
      layer.className = 'loading-layer';
      layer.innerHTML = '<div class="spinner-border text-primary"></div>';
      document.body.appendChild(layer);
    }
    layer.classList.toggle('active', !!active);
  }
  function call(action, payload) {
    setLoading(true);
    return new Promise(function(resolve, reject) {
      google.script.run.withSuccessHandler(function(response) {
        setLoading(false);
        if (!response || !response.ok) reject(new Error(response && response.error ? response.error.message : 'Lỗi hệ thống'));
        else resolve(response.data);
      }).withFailureHandler(function(error) {
        setLoading(false);
        reject(error);
      }).api(action, payload || {});
    });
  }
  function typeLabel(type) { return type === 'household' ? 'Hộ gia đình' : 'Nhân khẩu'; }
  function activateNav() {
    document.querySelectorAll('[data-route]').forEach(function(item) { item.classList.toggle('active', item.getAttribute('data-route') === 'import'); });
    if (el('pageTitle')) el('pageTitle').textContent = 'Import dữ liệu';
  }
  function payload() {
    return {
      spreadsheetId: el('importSpreadsheetId').value,
      sheetName: el('importSheetName').value,
      type: el('importType').value,
      duplicateMode: el('importDuplicateMode').value
    };
  }
  function cell(value, header) {
    return '<Cell' + (header ? ' ss:StyleID="Header"' : '') + '><Data ss:Type="String">' + xml(value) + '</Data></Cell>';
  }
  function row(values, header) {
    return '<Row>' + values.map(function(value) { return cell(value, header); }).join('') + '</Row>';
  }
  function worksheet(name, rows) {
    return '<Worksheet ss:Name="' + xml(name) + '"><Table>' + rows.map(function(values, index) { return row(values, index === 0); }).join('') + '</Table></Worksheet>';
  }
  function templateWorkbookXml() {
    var householdHeaders = ['Mã hộ','Tên chủ hộ','Địa chỉ/Thôn','Số điện thoại','Khu vực','Số nhân khẩu','Gia đình có công','Hộ nghèo','Hộ cận nghèo','Hộ có người tàn tật','Trạng thái','Ghi chú'];
    var personHeaders = ['Mã nhân khẩu','Mã hộ','Họ và tên','Giới tính','Ngày sinh','CCCD','Ngày cấp CCCD','Nơi cấp CCCD','Quan hệ với chủ hộ','Dân tộc','Tôn giáo','Nghề nghiệp','Số điện thoại','Thường trú','Nơi ở hiện nay','Học vấn','Hôn nhân','Trạng thái','Hiện tại'];
    var householdRows = [householdHeaders, ['H001','Nguyễn Văn A','Thôn 09, xã Hồng Phong','0912345678','Khu 1','3','Không','Không','Không','Không','ACTIVE','']];
    var personRows = [
      personHeaders,
      ['NK001','H001','Nguyễn Văn A','Nam','01/01/1980','012345678901','01/01/2020','Cục CSQLHC về TTXH','Chủ hộ','Kinh','Không','Nông dân','0912345678','Thôn 09, xã Hồng Phong','Thôn 09, xã Hồng Phong','THPT','Đã kết hôn','ALIVE','AT_HOME'],
      ['NK002','H001','Nguyễn Thị B','Nữ','02/02/1985','012345678902','01/01/2020','Cục CSQLHC về TTXH','Vợ','Kinh','Không','Nội trợ','0912345679','Thôn 09, xã Hồng Phong','Thôn 09, xã Hồng Phong','THPT','Đã kết hôn','ALIVE','AT_HOME'],
      ['NK003','H001','Nguyễn Văn C','Nam','03/03/2010','','','','Con','Kinh','Không','Học sinh/Sinh viên','','Thôn 09, xã Hồng Phong','Thôn 09, xã Hồng Phong','THCS','Chưa kết hôn','ALIVE','AWAY']
    ];
    var listKeys = Object.keys(templateLists);
    var maxListLength = listKeys.reduce(function(max, key) { return Math.max(max, templateLists[key].length); }, 0);
    var listRows = [listKeys];
    for (var index = 0; index < maxListLength; index += 1) {
      listRows.push(listKeys.map(function(key) { return templateLists[key][index] || ''; }));
    }
    var guideRows = [
      ['Hướng dẫn dùng file mẫu import'],
      ['Sheet HoDan: nhập danh sách hộ dân. Không đổi tên cột. Mã hộ không được trùng.'],
      ['Sheet NhanKhau: nhập danh sách nhân khẩu. Mã hộ phải tồn tại trong sheet HoDan hoặc đã có trong hệ thống.'],
      ['Ngày sinh và ngày cấp CCCD nhập dạng dd/mm/yyyy, ví dụ 01/01/1980.'],
      ['Trạng thái hộ: ACTIVE = Đang hoạt động, INACTIVE = Tạm ngưng.'],
      ['Trạng thái nhân khẩu: ALIVE = Còn sống, DECEASED = Đã chết.'],
      ['Hiện tại: AT_HOME = Ở nhà, AWAY = Đi vắng.'],
      ['Có thể xóa các dòng mẫu trước khi nhập dữ liệu thật.']
    ];
    return '<?xml version="1.0" encoding="UTF-8"?><?mso-application progid="Excel.Sheet"?>' +
      '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">' +
      '<Styles><Style ss:ID="Header"><Font ss:Bold="1" ss:Color="#FFFFFF"/><Interior ss:Color="#1F4E78" ss:Pattern="Solid"/></Style></Styles>' +
      worksheet('HoDan', householdRows) + worksheet('NhanKhau', personRows) + worksheet('DanhMuc', listRows) + worksheet('HuongDan', guideRows) + '</Workbook>';
  }
  function downloadTemplate() {
    var blob = new Blob(['\ufeff' + templateWorkbookXml()], { type: 'application/vnd.ms-excel;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var link = document.createElement('a');
    link.href = url;
    link.download = 'Mau_Import_Quan_Ly_Nhan_Khau_Thon_09.xls';
    document.body.appendChild(link);
    link.click();
    link.remove();
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
    toast('Đã tải file mẫu import Excel', 'success');
  }
  function resultCards(result) {
    return '<div class="report-summary-grid import-summary"><div>Tổng dòng<strong>' + html(result.totalRows || 0) + '</strong></div><div>Hợp lệ<strong>' + html(result.validRows || 0) + '</strong></div><div>Lỗi<strong>' + html(result.errorRows || result.failed || 0) + '</strong></div><div>Thành công<strong>' + html(result.success === undefined ? '-' : result.success) + '</strong></div></div>';
  }
  function errorTable(errors) {
    errors = errors || [];
    return '<div class="card"><div class="card-header"><strong>Chi tiết lỗi</strong></div><div class="card-body table-responsive p-0"><table class="table table-sm table-hover mb-0"><thead><tr><th>Dòng</th><th>Nội dung lỗi</th></tr></thead><tbody>' +
      (errors.length ? errors.map(function(error) { return '<tr><td>' + html(error.rowNumber) + '</td><td>' + html(error.message) + '</td></tr>'; }).join('') : '<tr><td colspan="2" class="text-center text-muted p-4">Không có lỗi</td></tr>') +
      '</tbody></table></div></div>';
  }
  function renderResult(result) {
    lastPreview = result;
    el('importResult').innerHTML = resultCards(result) + '<div class="card"><div class="card-body"><div><strong>Spreadsheet:</strong> ' + html(result.spreadsheetId) + '</div><div><strong>Sheet:</strong> ' + html(result.sheetName) + '</div><div><strong>Loại dữ liệu:</strong> ' + html(typeLabel(result.type)) + '</div><div><strong>Tiêu đề cột:</strong> ' + html((result.headers || []).filter(Boolean).join(', ')) + '</div>' + (result.created !== undefined ? '<div><strong>Tạo mới:</strong> ' + html(result.created) + ' | <strong>Cập nhật:</strong> ' + html(result.updated || 0) + ' | <strong>Bỏ qua:</strong> ' + html(result.skipped || 0) + '</div>' : '') + '</div></div>' + errorTable(result.errors);
  }
  function preview() {
    call('import.preview', payload()).then(function(result) {
      renderResult(result);
      toast('Đã kiểm tra dữ liệu import', result.errorRows ? 'warning' : 'success');
    }).catch(function(error) { toast(error.message, 'danger'); });
  }
  function runImport() {
    var data = payload();
    var action = data.type === 'household' ? 'import.household' : 'import.person';
    call(action, data).then(function(result) {
      renderResult(result);
      toast('Import hoàn tất: ' + result.success + ' thành công, ' + result.failed + ' lỗi', result.failed ? 'warning' : 'success');
    }).catch(function(error) { toast(error.message, 'danger'); });
  }
  function render() {
    activateNav();
    lastPreview = null;
    el('app').innerHTML = '<div class="import-workspace"><div class="card admin-editor"><div class="card-header d-flex justify-content-between align-items-center"><strong>Nguồn dữ liệu</strong><button id="btnImportTemplate" class="btn btn-outline-success btn-sm"><i class="fas fa-file-excel"></i> Tải file mẫu Excel</button></div><div class="card-body"><div class="alert alert-info mb-3">Tải file mẫu, nhập dữ liệu vào các sheet HoDan/NhanKhau, đưa file lên Google Sheets rồi dùng Spreadsheet ID để import.</div><div class="form-grid"><input id="importSpreadsheetId" class="form-control" placeholder="Google Spreadsheet ID"><input id="importSheetName" class="form-control" placeholder="Tên Sheet"><select id="importType" class="form-control"><option value="household">Hộ gia đình</option><option value="person">Nhân khẩu</option></select><select id="importDuplicateMode" class="form-control"><option value="skip">Bỏ qua mã hộ đã tồn tại</option><option value="update">Cập nhật mã hộ đã tồn tại</option></select></div></div><div class="card-footer text-right"><button id="btnImportPreview" class="btn btn-outline-secondary btn-sm"><i class="fas fa-magnifying-glass"></i> Kiểm tra dữ liệu</button> <button id="btnImportRun" class="btn btn-primary btn-sm"><i class="fas fa-file-import"></i> Bắt đầu Import</button></div></div><div id="importResult"></div></div>';
    el('importType').onchange = function() { el('importDuplicateMode').disabled = el('importType').value !== 'household'; };
    el('importType').onchange();
    el('btnImportTemplate').onclick = downloadTemplate;
    el('btnImportPreview').onclick = preview;
    el('btnImportRun').onclick = runImport;
  }
  document.addEventListener('click', function(event) {
    var link = event.target.closest('[data-route="import"]');
    if (!link) return;
    event.preventDefault();
    event.stopImmediatePropagation();
    render();
  }, true);
})();
</script>
