<script>
(function() {
  var state = { page: 1, pageSize: 20, keyword: '', householdId: '', status: '', presenceStatus: '' };
  var statusLabels = { ALIVE: 'Còn sống', DECEASED: 'Đã chết', ACTIVE: 'Còn sống', INACTIVE: 'Đã chết', DELETED: 'Đã xóa' };
  var presenceLabels = { AT_HOME: 'Ở nhà', AWAY: 'Đi vắng' };
  var statusOptions = [{ value: 'ALIVE', label: 'Còn sống' }, { value: 'DECEASED', label: 'Đã chết' }];
  var presenceOptions = [{ value: 'AT_HOME', label: 'Ở nhà' }, { value: 'AWAY', label: 'Đi vắng' }];
  var residencyOptions = ['Thường trú', 'Tạm trú'];
  var genderOptions = ['Nam', 'Nữ', 'Khác'];
  var relationshipOptions = ['Chủ hộ','Vợ','Chồng','Con','Cha','Mẹ','Ông','Bà','Anh','Chị','Em','Cháu','Dâu','Rể','Người thân khác','Người thuê trọ','Tạm trú','Khác'];
  var educationOptions = ['Chưa đi học','Mầm non','Tiểu học','THCS','THPT','Trung cấp','Cao đẳng','Đại học','Sau đại học','Không rõ'];
  var maritalOptions = ['Chưa kết hôn','Đã kết hôn','Ly hôn','Ly thân','Góa','Không rõ'];
  var ethnicityOptions = ['Kinh','Tày','Thái','Mường','Khmer','Hoa','Nùng','Hmong','Dao','Gia Rai','Ê Đê','Ba Na','Sán Chay','Chăm','Cơ Ho','Xơ Đăng','Sán Dìu','Hrê','Ra Glai','Mnông','Thổ','Xtiêng','Kháng','Khơ Mú','Bru-Vân Kiều','Cơ Tu','Giáy','Tà Ôi','Mạ','Giẻ Triêng','Co','Chơ Ro','Xinh Mun','Hà Nhì','Chu Ru','Lào','La Chí','La Ha','Phù Lá','La Hủ','Lự','Lô Lô','Chứt','Mảng','Pà Thẻn','Cơ Lao','Cống','Bố Y','Si La','Pu Péo','Brâu','Rơ Măm','Ơ Đu','Ngái'];
  var religionOptions = ['Không','Phật giáo','Công giáo','Tin Lành','Cao Đài','Phật giáo Hòa Hảo','Hồi giáo','Bà La Môn','Baha\'i','Bửu Sơn Kỳ Hương','Tịnh độ Cư sĩ Phật hội','Minh Sư Đạo','Minh Lý Đạo','Khác'];
  var occupationOptions = ['Chưa có việc làm','Học sinh/Sinh viên','Cán bộ/Công chức/Viên chức','Công nhân','Nông dân','Kinh doanh/Buôn bán','Lao động tự do','Giáo viên','Nhân viên văn phòng','Y tế','Kỹ sư/Kỹ thuật','Dịch vụ','Tài xế/Vận tải','Công an/Quân đội','Nội trợ','Hưu trí','Khác'];
  var personFields = [
    { name: 'citizenCode', label: 'Mã nhân khẩu', required: true },
    { name: 'householdId', label: 'Mã hộ', required: true },
    { name: 'fullName', label: 'Họ và tên', required: true },
    { name: 'gender', label: 'Giới tính', required: true, options: genderOptions },
    { name: 'dateOfBirth', label: 'Ngày sinh', required: true, type: 'date' },
    { name: 'identityNumber', label: 'CCCD/CMND' },
    { name: 'identityIssueDate', label: 'Ngày cấp', type: 'date' },
    { name: 'identityIssuePlace', label: 'Nơi cấp' },
    { name: 'relationship', label: 'Quan hệ với chủ hộ', required: true, options: relationshipOptions },
    { name: 'phone', label: 'Điện thoại' },
    { name: 'ethnicity', label: 'Dân tộc', options: ethnicityOptions },
    { name: 'religion', label: 'Tôn giáo', options: religionOptions },
    { name: 'occupation', label: 'Nghề nghiệp', options: occupationOptions },
    { name: 'educationLevel', label: 'Học vấn', options: educationOptions },
    { name: 'maritalStatus', label: 'Hôn nhân', options: maritalOptions },
    { name: 'status', label: 'Trạng thái', required: true, options: statusOptions },
    { name: 'presenceStatus', label: 'Hiện tại', required: true, options: presenceOptions },
    { name: 'permanentAddress', label: 'Cư trú', required: true, options: residencyOptions },
    { name: 'currentAddress', label: 'Nơi ở hiện nay', full: true }
  ];
  var detailFields = [
    ['citizenCode','Mã nhân khẩu'], ['fullName','Họ và tên'], ['gender','Giới tính'], ['dateOfBirth','Ngày sinh'],
    ['identityNumber','CCCD/CMND'], ['identityIssueDate','Ngày cấp CCCD/CMND'], ['identityIssuePlace','Nơi cấp CCCD/CMND'],
    ['householdId','Mã hộ'], ['householdHeadName','Chủ hộ'], ['householdAddress','Địa chỉ hộ'],
    ['relationship','Quan hệ với chủ hộ'], ['ethnicity','Dân tộc'], ['religion','Tôn giáo'], ['occupation','Nghề nghiệp'],
    ['phone','Điện thoại'], ['educationLevel','Học vấn'], ['maritalStatus','Hôn nhân'],
    ['permanentAddress','Cư trú'], ['currentAddress','Nơi ở hiện nay'], ['status','Trạng thái'], ['presenceStatus','Hiện tại'],
    ['createdAt','Ngày tạo'], ['createdBy','Người tạo'], ['updatedAt','Ngày cập nhật'], ['updatedBy','Người cập nhật'], ['deletedAt','Ngày xóa'], ['deletedBy','Người xóa']
  ];

  function el(id) { return document.getElementById(id); }
  function html(value) { return String(value === undefined || value === null ? '' : value).replace(/[&<>"]/g, function(s) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[s]); }); }
  function debounce(fn, delay) { var timer; return function() { var self = this; var args = arguments; clearTimeout(timer); timer = setTimeout(function() { fn.apply(self, args); }, delay || 250); }; }
  function normalizeText(value) { return String(value || '').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }
  function formatDate(value) {
    var raw = String(value || '').trim();
    if (!raw) return '';
    var iso = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (iso) return iso[3] + '/' + iso[2] + '/' + iso[1];
    var vn = raw.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);
    if (vn) return ('0' + vn[1]).slice(-2) + '/' + ('0' + vn[2]).slice(-2) + '/' + vn[3];
    var parsed = new Date(raw);
    if (!isNaN(parsed.getTime())) return ('0' + parsed.getDate()).slice(-2) + '/' + ('0' + (parsed.getMonth() + 1)).slice(-2) + '/' + parsed.getFullYear();
    return raw;
  }
  function setLoading(active) {
    var layer = el('loadingLayer');
    if (!layer) { layer = document.createElement('div'); layer.id = 'loadingLayer'; layer.className = 'loading-layer'; layer.innerHTML = '<div class="spinner-border text-primary"></div>'; document.body.appendChild(layer); }
    layer.classList.toggle('active', !!active);
  }
  function toast(message, kind) {
    var host = document.querySelector('.toast-host') || document.body.appendChild(document.createElement('div'));
    host.className = 'toast-host';
    var node = document.createElement('div');
    node.className = 'alert alert-' + (kind || 'info') + ' shadow-sm';
    node.textContent = message;
    host.appendChild(node);
    setTimeout(function() { node.remove(); }, 3500);
  }
  function attachAuth(payload) {
    return window.Thon09AttachAuth ? window.Thon09AttachAuth(payload || {}) : (payload || {});
  }
  function api(action, payload) {
    setLoading(true);
    return new Promise(function(resolve, reject) {
      google.script.run.withSuccessHandler(function(response) {
        setLoading(false);
        if (!response || !response.ok) return reject(new Error(response && response.error ? response.error.message : 'Không nhận được phản hồi từ hệ thống khi gọi ' + action));
        resolve(response.data);
      }).withFailureHandler(function(error) { setLoading(false); reject(new Error(error && error.message ? error.message : 'Không gọi được máy chủ')); }).api(action, attachAuth(payload || {}));
    });
  }
  function activate() {
    document.querySelectorAll('[data-route]').forEach(function(item) { item.classList.toggle('active', item.getAttribute('data-route') === 'citizen'); });
    if (el('pageTitle')) el('pageTitle').textContent = 'Quản lý nhân khẩu';
  }
  function canonicalStatus(value) { if (value === 'ACTIVE') return 'ALIVE'; if (value === 'INACTIVE') return 'DECEASED'; return value || 'ALIVE'; }
  function canonicalPresence(value) {
    var text = normalizeText(value);
    if (!text || text === 'at_home' || text === 'at home' || text === 'home' || text === 'o nha' || text === 'co mat') return 'AT_HOME';
    if (text === 'away' || text === 'di vang' || text === 'vang' || text === 'tam vang') return 'AWAY';
    return value || 'AT_HOME';
  }
  function canonicalResidency(value) {
    var text = normalizeText(value);
    if (!text || text === 'thuong tru' || text === 'permanent residence' || text === 'regular') return 'Thường trú';
    if (text === 'tam tru' || text === 'temporary residence' || text === 'temporary_residence') return 'Tạm trú';
    return value || 'Thường trú';
  }
  function isHouseholdHead(value) { return normalizeText(value) === 'chu ho'; }
  function householdCodeOf(row) { return String(row.householdId || row.householdCode || row.householdInternalId || '').trim(); }
  function householdGroupRow(code) { return '<tr class="person-household-group"><td colspan="12"><span>Mã hộ: ' + html(code || 'Chưa có mã hộ') + '</span></td></tr>'; }
  function statusBadge(value) { value = canonicalStatus(value); return '<span class="status-pill status-' + html(value) + '">' + html(statusLabels[value] || value) + '</span>'; }
  function presenceBadge(value) {
    value = canonicalPresence(value);
    var cls = value === 'AWAY' ? 'badge-warning' : 'badge-success';
    return '<span class="badge ' + cls + '">' + html(presenceLabels[value] || value) + '</span>';
  }
  function residencyBadge(value) {
    value = canonicalResidency(value);
    var cls = value === 'Tạm trú' ? 'badge-info' : 'badge-light';
    return '<span class="badge ' + cls + '">' + html(value) + '</span>';
  }
  function optionValue(option) { return typeof option === 'object' ? option.value : option; }
  function optionLabel(option) { return typeof option === 'object' ? option.label : option; }
  function readFilters() {
    if (el('personKeyword')) state.keyword = el('personKeyword').value.trim();
    if (el('personHousehold')) state.householdId = el('personHousehold').value.trim();
    if (el('personStatus')) state.status = el('personStatus').value;
    if (el('personPresenceStatus')) state.presenceStatus = el('personPresenceStatus').value;
    if (el('personPageSize')) state.pageSize = parseInt(el('personPageSize').value, 10) || 20;
    state.includeDeleted = state.status === 'DELETED';
    return Object.assign({}, state, { search: state.keyword, q: state.keyword, fullName: state.keyword, citizenCode: state.keyword, identityNumber: state.keyword, phone: state.keyword, householdCode: state.householdId });
  }
  function runSearch() { readFilters(); state.page = 1; refresh(); }
  function normalizePage(result) {
    result = result || {};
    if (Array.isArray(result)) result = { items: result, total: result.length, page: 1, pageSize: result.length || state.pageSize, totalPages: 1 };
    result.items = result.items || [];
    result.page = Number(result.page || state.page || 1);
    result.pageSize = Number(result.pageSize || state.pageSize || 20);
    result.total = Number(result.total || result.items.length || 0);
    result.totalPages = Math.max(Number(result.totalPages || Math.ceil(result.total / result.pageSize) || 1), 1);
    return result;
  }
  function pager(meta) {
    return '<div class="pagination-bar"><div class="text-muted">Tổng ' + html(meta.total) + ' nhân khẩu</div><div class="btn-group btn-group-sm"><button class="btn btn-outline-secondary" id="personPrev" title="Trang trước" ' + (meta.page <= 1 ? 'disabled' : '') + '><i class="fas fa-chevron-left"></i></button><button class="btn btn-outline-secondary" disabled>Trang ' + html(meta.page) + '/' + html(meta.totalPages) + '</button><button class="btn btn-outline-secondary" id="personNext" title="Trang sau" ' + (meta.page >= meta.totalPages ? 'disabled' : '') + '><i class="fas fa-chevron-right"></i></button></div></div>';
  }
  function actions(row) {
    var view = '<button class="btn btn-outline-info btn-xs" title="Xem chi tiết" data-person-view="' + html(row.id) + '"><i class="fas fa-eye"></i></button>';
    if (row.status === 'DELETED') return view + ' <button class="btn btn-outline-success btn-xs" title="Khôi phục" data-person-restore="' + html(row.id) + '"><i class="fas fa-rotate-left"></i></button>';
    return view + ' <button class="btn btn-outline-primary btn-xs" title="Sửa" data-person-edit="' + html(row.id) + '"><i class="fas fa-pen"></i></button> <button class="btn btn-outline-danger btn-xs" title="Xóa" data-person-delete="' + html(row.id) + '"><i class="fas fa-trash"></i></button>';
  }
  function renderPersonRow(row) {
    var headMark = isHouseholdHead(row.relationship) ? ' <span class="badge badge-primary ml-1">Chủ hộ</span>' : '';
    return '<tr class="person-row' + (isHouseholdHead(row.relationship) ? ' person-head-row' : '') + '" data-person-row="' + html(row.id) + '" title="Bấm để xem chi tiết"><td>' + html(row.citizenCode) + '</td><td>' + html(row.fullName) + headMark + '</td><td>' + html(row.identityNumber) + '</td><td>' + html(householdCodeOf(row)) + '</td><td>' + html(row.gender) + '</td><td>' + html(formatDate(row.dateOfBirth)) + '</td><td>' + html(row.relationship) + '</td><td>' + html(row.phone) + '</td><td>' + statusBadge(row.status) + '</td><td>' + residencyBadge(row.permanentAddress) + '</td><td>' + presenceBadge(row.presenceStatus) + '</td><td class="action-cell">' + actions(row) + '</td></tr>';
  }
  function renderTable(result) {
    var rows = result.items || [];
    var lastHousehold = null;
    var body = rows.length ? rows.map(function(row) {
      var code = householdCodeOf(row);
      var group = normalizeText(code);
      var prefix = group !== lastHousehold ? householdGroupRow(code) : '';
      lastHousehold = group;
      return prefix + renderPersonRow(row);
    }).join('') : '<tr><td colspan="12" class="text-center text-muted p-4">Không có dữ liệu nhân khẩu</td></tr>';
    var styles = '<style>.person-household-group td{background:#f3f6f9;color:#5f6b7a;font-weight:600;border-top:12px solid #fff;border-bottom:1px solid #dfe6ee}.person-household-group span{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;background:#e8eef5}.person-head-row td{background:#fbfdff;font-weight:600}</style>';
    return styles + '<div class="card"><div class="card-body table-responsive p-0"><table class="table table-hover table-sm mb-0"><thead><tr><th>Mã</th><th>Họ tên</th><th>CCCD/CMND</th><th>Mã hộ</th><th>Giới tính</th><th>Ngày sinh</th><th>Quan hệ</th><th>Điện thoại</th><th>Trạng thái</th><th>Cư trú</th><th>Hiện tại</th><th>Thao tác</th></tr></thead><tbody>' + body + '</tbody></table></div></div>' + pager(result);
  }
  function control(field, values) {
    var value = String((values || {})[field.name] || '');
    if (field.name === 'status') value = canonicalStatus(value || 'ALIVE');
    if (field.name === 'presenceStatus') value = canonicalPresence(value || 'AT_HOME');
    if (field.name === 'permanentAddress') value = canonicalResidency(value || 'Thường trú');
    if (field.options) {
      var hasCurrent = !value || field.options.some(function(option) { return String(optionValue(option)) === value; });
      return '<select class="form-control" name="' + html(field.name) + '" ' + (field.required ? 'required' : '') + '><option value="">-- Chọn --</option>' + (hasCurrent ? '' : '<option value="' + html(value) + '" selected>' + html(statusLabels[value] || presenceLabels[value] || value) + '</option>') + field.options.map(function(option) {
        var optValue = String(optionValue(option));
        return '<option value="' + html(optValue) + '" ' + (optValue === value ? 'selected' : '') + '>' + html(optionLabel(option)) + '</option>';
      }).join('') + '</select>';
    }
    return '<input type="' + html(field.type || 'text') + '" class="form-control" name="' + html(field.name) + '" value="' + html(value) + '" ' + (field.required ? 'required' : '') + '>';
  }
  function modalForm(title, values, onSubmit) {
    var markup = '<div class="modal fade" id="personModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">' + html(title) + '</h5><button type="button" class="close" data-dismiss="modal" aria-label="Đóng">&times;</button></div><div class="modal-body"><form id="personForm"><div class="form-grid">' + personFields.map(function(field) {
      return '<div class="form-group' + (field.full ? ' full' : '') + '"><label>' + html(field.label) + '</label>' + control(field, values) + '</div>';
    }).join('') + '</div><button class="btn btn-primary btn-material" type="submit"><i class="fas fa-save"></i> Lưu</button></form></div></div></div></div>';
    document.body.insertAdjacentHTML('beforeend', markup);
    $('#personModal').modal('show').on('hidden.bs.modal', function() { this.remove(); });
    el('personForm').addEventListener('submit', function(event) {
      event.preventDefault();
      var payload = Array.from(event.target.elements).reduce(function(acc, input) { if (input.name) acc[input.name] = input.value; return acc; }, {});
      try { validate(payload); } catch (err) { toast(err.message, 'warning'); return; }
      onSubmit(payload);
    });
  }
  function detailValue(row, key) {
    if (key === 'status') return statusBadge(row.status);
    if (key === 'presenceStatus') return presenceBadge(row.presenceStatus);
    if (key === 'permanentAddress') return residencyBadge(row.permanentAddress);
    if (key === 'dateOfBirth' || key === 'identityIssueDate') return html(formatDate(row[key]));
    return html(row[key] || '');
  }
  function showDetail(row) {
    var rows = detailFields.map(function(item) { return '<tr><th style="width:32%">' + html(item[1]) + '</th><td>' + detailValue(row, item[0]) + '</td></tr>'; }).join('');
    var markup = '<div class="modal fade" id="personDetailModal" tabindex="-1"><div class="modal-dialog modal-xl"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Thông tin nhân khẩu: ' + html(row.fullName || row.citizenCode || '') + '</h5><button type="button" class="close" data-dismiss="modal" aria-label="Đóng">&times;</button></div><div class="modal-body"><div class="table-responsive"><table class="table table-sm table-bordered mb-0"><tbody>' + rows + '</tbody></table></div></div><div class="modal-footer"><button type="button" class="btn btn-outline-secondary btn-sm" data-dismiss="modal">Đóng</button><button type="button" class="btn btn-primary btn-sm" id="btnDetailEdit"><i class="fas fa-pen"></i> Sửa</button></div></div></div></div>';
    document.body.insertAdjacentHTML('beforeend', markup);
    $('#personDetailModal').modal('show').on('hidden.bs.modal', function() { this.remove(); });
    el('btnDetailEdit').onclick = function() { $('#personDetailModal').modal('hide'); modalForm('Cập nhật nhân khẩu', row, function(payload) { payload.id = row.id; api('person.update', payload).then(function() { $('#personModal').modal('hide'); toast('Đã cập nhật nhân khẩu', 'success'); refresh(); }).catch(function(error) { toast(error.message, 'danger'); }); }); };
  }
  function validate(payload) {
    payload.permanentAddress = canonicalResidency(payload.permanentAddress);
    if (!payload.citizenCode || !/^[A-Za-z0-9._-]{2,30}$/.test(payload.citizenCode)) throw new Error('Mã nhân khẩu không hợp lệ');
    if (!payload.householdId) throw new Error('Cần nhập Mã hộ');
    if (!payload.fullName || payload.fullName.trim().length < 2) throw new Error('Họ tên phải có ít nhất 2 ký tự');
    if (!payload.gender) throw new Error('Cần chọn giới tính');
    if (!payload.dateOfBirth) throw new Error('Cần nhập ngày sinh');
    if (!payload.relationship) throw new Error('Cần chọn quan hệ với chủ hộ');
    if (!payload.status) throw new Error('Cần chọn trạng thái');
    if (!payload.presenceStatus) throw new Error('Cần chọn hiện tại ở nhà hay đi vắng');
    if (residencyOptions.indexOf(payload.permanentAddress) === -1) throw new Error('Cư trú chỉ được chọn Thường trú hoặc Tạm trú');
    if (payload.identityNumber && !/^\d{9}$|^\d{12}$/.test(payload.identityNumber)) throw new Error('CCCD/CMND phải gồm 9 hoặc 12 chữ số');
    if (payload.phone && !/^[0-9+() .-]{8,20}$/.test(payload.phone)) throw new Error('Số điện thoại không hợp lệ');
  }
  function refresh() {
    api('person.safePage', readFilters()).then(function(result) {
      result = normalizePage(result);
      var grid = el('grid');
      if (!grid) return;
      grid.innerHTML = renderTable(result);
      bindRows(result);
    }).catch(function(error) {
      var grid = el('grid');
      if (grid) grid.innerHTML = '<div class="alert alert-danger">Không tải được danh sách nhân khẩu: ' + html(error.message) + '</div>';
      toast(error.message, 'danger');
    });
  }
  function findRow(result, id) { return (result.items || []).filter(function(item) { return item.id === id; })[0] || null; }
  function bindRows(result) {
    document.querySelectorAll('[data-person-row]').forEach(function(rowNode) { rowNode.onclick = function(event) { if (event.target.closest('button')) return; var row = findRow(result, rowNode.getAttribute('data-person-row')); if (row) showDetail(row); }; });
    document.querySelectorAll('[data-person-view]').forEach(function(btn) { btn.onclick = function(event) { event.preventDefault(); event.stopPropagation(); var row = findRow(result, btn.getAttribute('data-person-view')); if (row) showDetail(row); }; });
    document.querySelectorAll('[data-person-edit]').forEach(function(btn) { btn.onclick = function(event) { event.preventDefault(); event.stopPropagation(); var row = findRow(result, btn.getAttribute('data-person-edit')); modalForm('Cập nhật nhân khẩu', row, function(payload) { payload.id = row.id; api('person.update', payload).then(function() { $('#personModal').modal('hide'); toast('Đã cập nhật nhân khẩu', 'success'); refresh(); }).catch(function(error) { toast(error.message, 'danger'); }); }); }; });
    document.querySelectorAll('[data-person-delete]').forEach(function(btn) { btn.onclick = function(event) { event.preventDefault(); event.stopPropagation(); if (!confirm('Xác nhận xóa mềm nhân khẩu này?')) return; api('person.delete', { id: btn.dataset.personDelete }).then(function() { toast('Đã xóa nhân khẩu', 'success'); refresh(); }).catch(function(error) { toast(error.message, 'danger'); }); }; });
    document.querySelectorAll('[data-person-restore]').forEach(function(btn) { btn.onclick = function(event) { event.preventDefault(); event.stopPropagation(); api('person.restore', { id: btn.dataset.personRestore }).then(function() { state.status = ''; toast('Đã khôi phục nhân khẩu', 'success'); render(); }).catch(function(error) { toast(error.message, 'danger'); }); }; });
    if (el('personPrev')) el('personPrev').onclick = function() { if (state.page > 1) { state.page -= 1; refresh(); } };
    if (el('personNext')) el('personNext').onclick = function() { if (state.page < result.totalPages) { state.page += 1; refresh(); } };
  }
  function render() {
    activate();
    var app = el('app');
    if (!app) return;
    app.innerHTML = '<div class="module-toolbar"><div class="filters"><input id="personKeyword" class="form-control form-control-sm" placeholder="Tìm họ tên, mã, CCCD, điện thoại, thường trú, tạm trú, ở nhà, đi vắng"><input id="personHousehold" class="form-control form-control-sm" placeholder="Mã hộ"><select id="personStatus" class="form-control form-control-sm"><option value="">Tất cả trạng thái</option><option value="ALIVE">Còn sống</option><option value="DECEASED">Đã chết</option><option value="DELETED">Đã xóa</option></select><select id="personPresenceStatus" class="form-control form-control-sm"><option value="">Tất cả hiện tại</option><option value="AT_HOME">Ở nhà</option><option value="AWAY">Đi vắng</option></select><select id="personPageSize" class="form-control form-control-sm"><option>10</option><option>20</option><option>50</option><option>100</option></select><button class="btn btn-outline-primary btn-sm" id="personSearch" title="Tìm kiếm"><i class="fas fa-search"></i></button><button class="btn btn-outline-secondary btn-sm" id="personClearSearch" title="Xóa tìm kiếm"><i class="fas fa-times"></i></button></div><div class="actions"><button class="btn btn-primary btn-sm btn-material" id="btnCreatePerson"><i class="fas fa-plus"></i> Thêm nhân khẩu</button></div></div><div id="grid"></div>';
    el('personKeyword').value = state.keyword;
    el('personHousehold').value = state.householdId;
    el('personStatus').value = state.status;
    el('personPresenceStatus').value = state.presenceStatus;
    el('personPageSize').value = state.pageSize;
    el('btnCreatePerson').onclick = function() { modalForm('Thêm nhân khẩu', {}, function(payload) { api('person.create', payload).then(function() { $('#personModal').modal('hide'); state.keyword = ''; state.householdId = ''; state.status = ''; state.presenceStatus = ''; state.page = 1; toast('Đã thêm nhân khẩu', 'success'); render(); }).catch(function(error) { toast(error.message, 'danger'); }); }); };
    el('personSearch').onclick = runSearch;
    el('personClearSearch').onclick = function() { el('personKeyword').value = ''; el('personHousehold').value = ''; el('personStatus').value = ''; el('personPresenceStatus').value = ''; runSearch(); };
    el('personKeyword').oninput = debounce(runSearch, 350);
    el('personHousehold').oninput = debounce(runSearch, 350);
    el('personKeyword').onkeydown = function(event) { if (event.key === 'Enter') { event.preventDefault(); runSearch(); } };
    el('personHousehold').onkeydown = function(event) { if (event.key === 'Enter') { event.preventDefault(); runSearch(); } };
    el('personStatus').onchange = runSearch;
    el('personPresenceStatus').onchange = runSearch;
    el('personPageSize').onchange = runSearch;
    refresh();
  }
  document.addEventListener('click', function(event) { var link = event.target.closest('[data-route="citizen"]'); if (!link) return; event.preventDefault(); event.stopImmediatePropagation(); render(); }, true);
  window.Thon09PersonModule = { render: render, refresh: refresh };
})();
