<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Google Maps Test</title>
  <style>
    html,body,#map{width:100%;height:100%;margin:0}
    #status{position:fixed;z-index:10;top:12px;left:12px;max-width:calc(100vw - 24px);padding:8px 10px;background:#fff;border:1px solid #d0d7de;font:14px Arial,sans-serif;box-shadow:0 8px 22px rgba(15,23,42,.16)}
  </style>
</head>
<body>
  <div id="status">Loading Google Maps...</div>
  <div id="map"></div>
  <script>
    (function(){
      'use strict';
      var statusEl = document.getElementById('status');
      function setStatus(text){ statusEl.textContent = text; }
      function fail(message){ setStatus('FAIL: ' + message); console.error(message); }
      window.__gmAuthFailure = false;
      window.gm_authFailure = function(){ window.__gmAuthFailure = true; fail('gm_authFailure'); };
      function extractKey(html){
        var match = String(html || '').match(/window\.THON09_GOOGLE_MAPS_API_KEY\s*=\s*"([^"]+)"/);
        return match ? match[1].trim() : '';
      }
      function mapsReady(){
        var maps = window.google && window.google.maps;
        return !!(maps && maps.Map && maps.Marker && maps.InfoWindow && maps.Polygon && maps.places && maps.places.PlacesService);
      }
      function waitForMapsReady(){
        return new Promise(function(resolve, reject){
          var started = Date.now();
          (function wait(){
            if (mapsReady()) return resolve();
            if (Date.now() - started > 30000) return reject(new Error('Google Maps timeout'));
            setTimeout(wait, 80);
          })();
        });
      }
      function loadScriptOnce(src){
        if (mapsReady()) return Promise.resolve();
        var existing = document.querySelector('script[data-google-test-loader="1"]');
        if (existing) return waitForMapsReady();
        return new Promise(function(resolve, reject){
          var script = document.createElement('script');
          script.src = src;
          script.async = true;
          script.defer = true;
          script.referrerPolicy = 'origin';
          script.dataset.googleTestLoader = '1';
          script.onload = function(){ waitForMapsReady().then(resolve, reject); };
          script.onerror = function(){ reject(new Error('Google Maps JavaScript API load failed')); };
          document.head.appendChild(script);
        });
      }
      function verifyAndRender(){
        var maps = window.google && window.google.maps;
        var checks = {
          'window.google.maps': !!maps,
          'google.maps.Map': !!(maps && maps.Map),
          'google.maps.Marker': !!(maps && maps.Marker),
          'google.maps.InfoWindow': !!(maps && maps.InfoWindow),
          'google.maps.Polygon': !!(maps && maps.Polygon),
          'google.maps.places.PlacesService': !!(maps && maps.places && maps.places.PlacesService)
        };
        var missing = Object.keys(checks).filter(function(name){ return !checks[name]; });
        if (window.__gmAuthFailure) return fail('gm_authFailure');
        if (missing.length) return fail('Missing ' + missing.join(', '));
        var center = {lat:20.0715,lng:106.1712};
        var map = new maps.Map(document.getElementById('map'), {center:center, zoom:16, mapTypeId:'roadmap'});
        new maps.Marker({map:map, position:center, title:'Google Maps Test'});
        new maps.InfoWindow({content:'Google Maps Test PASS'});
        new maps.Polygon({map:map, paths:[center,{lat:center.lat+0.001,lng:center.lng},{lat:center.lat,lng:center.lng+0.001}], strokeColor:'#2563eb', fillColor:'#2563eb', fillOpacity:.15});
        new maps.places.PlacesService(map);
        setStatus('PASS: Google Maps initialized');
      }
      fetch('/?google-test=' + Date.now(), {cache:'no-store'})
        .then(function(response){ return response.text(); })
        .then(function(html){
          var key = extractKey(html);
          if (!key) throw new Error('GOOGLE_MAPS_API_KEY not found in app shell');
          var src = 'https://maps.googleapis.com/maps/api/js?key=' + encodeURIComponent(key) + '&libraries=places,geometry&language=vi&region=VN&v=weekly&loading=async';
          return loadScriptOnce(src);
        })
        .then(verifyAndRender)
        .catch(function(error){ fail(error && error.message ? error.message : String(error)); });
    })();
  </script>
</body>
</html>
