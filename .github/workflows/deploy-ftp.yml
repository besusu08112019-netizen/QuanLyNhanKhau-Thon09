name: Deploy to FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate production secrets
        shell: bash
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST || vars.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT || vars.DB_PORT }}
          DB_DATABASE: ${{ secrets.DB_DATABASE || vars.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME || vars.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_CHARSET: ${{ secrets.DB_CHARSET || vars.DB_CHARSET }}
        run: |
          missing=0
          for name in FTP_SERVER FTP_USERNAME FTP_PASSWORD DB_HOST DB_DATABASE DB_USERNAME DB_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is missing. Add it as a GitHub Actions secret, or add non-sensitive DB values as repository/environment variables. DB_PASSWORD must be a secret."
              missing=1
            fi
          done
          exit "$missing"

      - name: Create production env file
        shell: bash
        env:
          DB_HOST: ${{ secrets.DB_HOST || vars.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT || vars.DB_PORT }}
          DB_SOCKET: ${{ secrets.DB_SOCKET || vars.DB_SOCKET }}
          DB_DATABASE: ${{ secrets.DB_DATABASE || vars.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME || vars.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_CHARSET: ${{ secrets.DB_CHARSET || vars.DB_CHARSET }}
        run: |
          {
            echo "DB_HOST=${DB_HOST}"
            echo "DB_PORT=${DB_PORT:-3306}"
            if [ -n "${DB_SOCKET}" ]; then echo "DB_SOCKET=${DB_SOCKET}"; fi
            echo "DB_DATABASE=${DB_DATABASE}"
            echo "DB_USERNAME=${DB_USERNAME}"
            echo "DB_PASSWORD=${DB_PASSWORD}"
            echo "DB_CHARSET=${DB_CHARSET:-utf8mb4}"
          } > .env

      - name: Bust frontend asset cache
        shell: bash
        env:
          ASSET_VERSION: sprint14-${{ github.run_number }}-${{ github.run_attempt }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ['ASSET_VERSION']

          mobile_js_path = Path('assets/js/mobile-design-system.js')
          if mobile_js_path.exists():
              mobile_js = mobile_js_path.read_text(encoding='utf-8')
              mobile_js = re.sub(
                  r'assets/js/admin-design-system\.js\?v=[^\'"\s]+',
                  f'assets/js/admin-design-system.js?v={version}',
                  mobile_js,
              )
              mobile_js_path.write_text(mobile_js, encoding='utf-8')

          app_path = Path('views/app.php')
          html = app_path.read_text(encoding='utf-8')
          html = re.sub(r'assets/js/csrf\.js\?v=[^"\']+', f'assets/js/csrf.js?v={version}', html)

          css_href = f'assets/css/person-card-layout.css?v={version}'
          js_src = f'assets/js/mobile-design-system.js?v={version}'

          html = re.sub(
              r'\n\s*<link rel="stylesheet" href="assets/css/person-card-layout\.css\?v=[^"\']+">',
              '',
              html,
          )
          if 'assets/css/person-card-layout.css' not in html:
              html = html.replace('</head>', f'  <link rel="stylesheet" href="{css_href}">\n</head>')

          html = re.sub(
              r'\n\s*<script src="assets/js/mobile-design-system\.js\?v=[^"\']+"></script>',
              '',
              html,
          )
          if 'assets/js/mobile-design-system.js' not in html:
              html = html.replace('</body>', f'  <script src="{js_src}"></script>\n</body>')

          app_path.write_text(html, encoding='utf-8')
          print(f'Updated csrf.js asset version to {version}')
          print(f'Ensured mobile population card assets with version {version}')
          print(f'Updated admin design system reference to {version}')
          PY

      - name: Deploy to hosting via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            uploads/**
            backups/**
