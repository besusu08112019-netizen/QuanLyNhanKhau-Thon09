name: Person table cache fix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/person-table-cache-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix person table cache and empty colspan
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          index = Path('index.php')
          text = index.read_text(encoding='utf-8')
          text = text.replace("define('APP_ASSET_VERSION', '20260703-desktop-only-cleanup-2');", "define('APP_ASSET_VERSION', '20260703-person-table-cache-3');")
          index.write_text(text, encoding='utf-8')

          patch = Path('assets/js/view-inline-patches.js')
          text = patch.read_text(encoding='utf-8')
          text = text.replace('colspan=\"10\"', 'colspan=\"12\"')
          patch.write_text(text, encoding='utf-8')
          PY
      - name: Commit source changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.php assets/js/view-inline-patches.js
          git diff --cached --quiet && exit 0
          git commit -m "Fix person table asset cache and empty colspan"
          git push
