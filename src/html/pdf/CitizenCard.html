<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; color: #1f2933; font-size: 13px; }
    .header { text-align: center; border-bottom: 2px solid #1f2933; padding-bottom: 12px; margin-bottom: 20px; }
    .title { font-size: 20px; font-weight: 700; text-transform: uppercase; }
    .subtitle { margin-top: 4px; color: #52606d; }
    table { width: 100%; border-collapse: collapse; }
    td { border: 1px solid #cbd2d9; padding: 8px; }
    td:first-child { width: 32%; font-weight: 700; background: #f5f7fa; }
    .footer { margin-top: 32px; display: flex; justify-content: space-between; }
    .signature { width: 220px; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">Phiếu thông tin nhân khẩu</div>
    <div class="subtitle">Hệ thống Quản lý Nhân khẩu Thôn 09</div>
  </div>
  <table>
    <tr><td>Mã nhân khẩu</td><td><?= citizen.citizenCode ?></td></tr>
    <tr><td>Họ và tên</td><td><?= citizen.fullName ?></td></tr>
    <tr><td>Giới tính</td><td><?= citizen.gender ?></td></tr>
    <tr><td>Ngày sinh</td><td><?= citizen.dateOfBirth ?></td></tr>
    <tr><td>CCCD/CMND</td><td><?= citizen.identityNumber ?></td></tr>
    <tr><td>Quan hệ với chủ hộ</td><td><?= citizen.relationship ?></td></tr>
    <tr><td>Nghề nghiệp</td><td><?= citizen.occupation ?></td></tr>
    <tr><td>Địa chỉ thường trú</td><td><?= citizen.permanentAddress ?></td></tr>
    <tr><td>Nơi ở hiện nay</td><td><?= citizen.currentAddress ?></td></tr>
    <tr><td>Trạng thái</td><td><?= citizen.status ?></td></tr>
  </table>
  <div class="footer">
    <div>Ngày xuất: <?= new Date().toLocaleDateString('vi-VN') ?></div>
    <div class="signature">Người lập<br><br><br>________________</div>
  </div>
</body>
</html>
