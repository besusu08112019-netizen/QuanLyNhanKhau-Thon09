<script>
(function() {
  function html(value) {
    return String(value === undefined || value === null ? '' : value).replace(/[&<>"]/g, function(s) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[s]);
    });
  }

  function attachAuth(payload) {
    return window.Thon09AttachAuth ? window.Thon09AttachAuth(payload || {}) : (payload || {});
  }

  function setLoading(active) {
    var layer = document.getElementById('loadingLayer');
    if (!layer) {
      layer = document.createElement('div');
      layer.id = 'loadingLayer';
      layer.className = 'loading-layer';
      layer.innerHTML = '<div class="spinner-border text-primary"></div>';
      document.body.appendChild(layer);
    }
    layer.classList.toggle('active', !!active);
  }

  function toast(message, kind) {
    var host = document.querySelector('.toast-host') || document.body.appendChild(document.createElement('div'));
    host.className = 'toast-host';
    var node = document.createElement('div');
    node.className = 'alert alert-' + (kind || 'info') + ' shadow-sm';
    node.textContent = message;
    host.appendChild(node);
    setTimeout(function() { node.remove(); }, 4200);
  }

  function api(action, payload) {
    setLoading(true);
    return new Promise(function(resolve, reject) {
      google.script.run.withSuccessHandler(function(response) {
        setLoading(false);
        if (!response || !response.ok) {
          reject(new Error(response && response.error ? response.error.message : 'Không nhận được phản hồi từ hệ thống'));
          return;
        }
        resolve(response.data);
      }).withFailureHandler(function(error) {
        setLoading(false);
        reject(new Error(error && error.message ? error.message : 'Không gọi được máy chủ'));
      }).api(action, attachAuth(payload || {}));
    });
  }

  function route() {
    var active = document.querySelector('.nav-link.active[data-route]');
    return active ? active.getAttribute('data-route') : '';
  }

  function selected(selector) {
    return Array.prototype.slice.call(document.querySelectorAll(selector + ':checked'));
  }

  function setButtonCount(button, count) {
    if (!button) return;
    button.disabled = count < 1;
    button.innerHTML = '<i class="fas fa-trash"></i> Xóa đã chọn' + (count ? ' (' + count + ')' : '');
  }

  function ensureBulkButton(id, label, onClick) {
    var actions = document.querySelector('.module-toolbar .actions');
    if (!actions) return null;
    var button = document.getElementById(id);
    if (!button) {
      button = document.createElement('button');
      button.id = id;
      button.type = 'button';
      button.className = 'btn btn-outline-danger btn-sm ml-2';
      button.title = label;
      button.disabled = true;
      button.onclick = onClick;
      actions.insertBefore(button, actions.firstChild);
    }
    return button;
  }

  function enhancePerson() {
    var table = document.querySelector('#grid table');
    if (!table || table.getAttribute('data-bulk-person-ready') === '1') return;
    var headRow = table.querySelector('thead tr');
    if (!headRow) return;
    table.setAttribute('data-bulk-person-ready', '1');
    headRow.insertAdjacentHTML('afterbegin', '<th style="width:36px"><input type="checkbox" id="personBulkAll" title="Chọn tất cả nhân khẩu trên trang"></th>');
    table.querySelectorAll('tr.person-household-group td').forEach(function(cell) {
      cell.setAttribute('colspan', String((parseInt(cell.getAttribute('colspan') || '12', 10) || 12) + 1));
    });
    table.querySelectorAll('tbody tr[data-person-row]').forEach(function(row) {
      var id = row.getAttribute('data-person-row');
      row.insertAdjacentHTML('afterbegin', '<td><input type="checkbox" class="bulk-person-check" value="' + html(id) + '" title="Chọn nhân khẩu này"></td>');
    });
    var button = ensureBulkButton('btnBulkDeletePerson', 'Xóa nhiều nhân khẩu', deleteSelectedPeople);
    var all = document.getElementById('personBulkAll');
    function update() { setButtonCount(button, selected('.bulk-person-check').length); }
    if (all) all.onchange = function() { document.querySelectorAll('.bulk-person-check').forEach(function(item) { item.checked = all.checked; }); update(); };
    document.querySelectorAll('.bulk-person-check').forEach(function(item) {
      item.onclick = function(event) { event.stopPropagation(); };
      item.onchange = update;
    });
    update();
  }

  function deleteSelectedPeople() {
    var ids = selected('.bulk-person-check').map(function(item) { return item.value; }).filter(Boolean);
    if (!ids.length) return toast('Vui lòng chọn nhân khẩu cần xóa', 'warning');
    if (!confirm('Xác nhận xóa mềm ' + ids.length + ' nhân khẩu đã chọn?')) return;
    setLoading(true);
    var success = 0;
    var failed = [];
    ids.reduce(function(chain, id) {
      return chain.then(function() {
        return api('person.delete', { id: id }).then(function() { success += 1; }).catch(function(error) { failed.push(error.message); });
      });
    }, Promise.resolve()).then(function() {
      setLoading(false);
      if (failed.length) toast('Đã xóa ' + success + ' nhân khẩu, lỗi ' + failed.length + ': ' + failed[0], 'warning');
      else toast('Đã xóa ' + success + ' nhân khẩu', 'success');
      if (window.Thon09PersonModule && window.Thon09PersonModule.refresh) window.Thon09PersonModule.refresh();
    });
  }

  function enhanceHousehold() {
    var table = document.querySelector('#householdGrid table');
    if (!table || table.getAttribute('data-bulk-household-ready') === '1') return;
    var headRow = table.querySelector('thead tr');
    if (!headRow) return;
    table.setAttribute('data-bulk-household-ready', '1');
    headRow.insertAdjacentHTML('afterbegin', '<th style="width:36px"><input type="checkbox" id="householdBulkAll" title="Chọn tất cả hộ dân trên trang"></th>');
    table.querySelectorAll('tbody tr[data-household-row]').forEach(function(row) {
      var index = row.getAttribute('data-household-row');
      row.insertAdjacentHTML('afterbegin', '<td><input type="checkbox" class="bulk-household-check" value="' + html(index) + '" title="Chọn hộ dân này"></td>');
    });
    var button = ensureBulkButton('btnBulkDeleteHousehold', 'Xóa nhiều hộ dân', deleteSelectedHouseholds);
    var all = document.getElementById('householdBulkAll');
    function update() { setButtonCount(button, selected('.bulk-household-check').length); }
    if (all) all.onchange = function() { document.querySelectorAll('.bulk-household-check').forEach(function(item) { item.checked = all.checked; }); update(); };
    document.querySelectorAll('.bulk-household-check').forEach(function(item) {
      item.onclick = function(event) { event.stopPropagation(); };
      item.onchange = update;
    });
    update();
  }

  function deleteSelectedHouseholds() {
    var checks = selected('.bulk-household-check');
    if (!checks.length) return toast('Vui lòng chọn hộ dân cần xóa', 'warning');
    if (!confirm('Xác nhận xóa mềm ' + checks.length + ' hộ dân đã chọn?')) return;
    var buttons = checks.map(function(item) {
      return document.querySelector('[data-delete-household="' + item.value + '"]');
    }).filter(Boolean);
    if (!buttons.length) return toast('Không tìm thấy thao tác xóa cho các hộ đã chọn', 'danger');
    var originalConfirm = window.confirm;
    window.confirm = function() { return true; };
    buttons.forEach(function(button) { button.click(); });
    window.confirm = originalConfirm;
    toast('Đã gửi yêu cầu xóa ' + buttons.length + ' hộ dân', 'success');
  }

  function enhance() {
    var current = route();
    if (current === 'citizen') enhancePerson();
    if (current === 'household') enhanceHousehold();
  }

  var observer = new MutationObserver(function() { window.setTimeout(enhance, 0); });
  observer.observe(document.body, { childList: true, subtree: true });
  document.addEventListener('click', function(event) {
    if (event.target.closest('[data-route], #personSearch, #householdSearch, #personClearSearch, #householdClearSearch, #personPrev, #personNext, #householdPrev, #householdNext')) {
      window.setTimeout(enhance, 250);
    }
  }, true);
  window.setInterval(enhance, 1200);
})();
</script>
