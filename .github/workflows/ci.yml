name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-person-table:
    name: One-shot person desktop table mapping patch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Patch files and restore workflows
        shell: bash
        run: |
          set -euo pipefail
          python -c "import base64; exec(base64.b64decode(''))"
          node --check assets/js/app.js
          git checkout abff4124ada78859f903782a5175cfcaff705060 -- .github/workflows/ci.yml
          rm -f .github/workflows/person-desktop-table-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add views/app.php assets/js/app.js .github/workflows/ci.yml .github/workflows/person-desktop-table-fix.yml
          if git diff --cached --quiet; then
            echo "No one-shot changes to commit"
          else
            git commit -m "Fix person desktop table column mapping"
            git push
          fi
