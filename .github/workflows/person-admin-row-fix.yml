name: Person admin row fix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/person-admin-row-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix admin person row mapping
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          index = Path('index.php')
          text = index.read_text(encoding='utf-8')
          text = text.replace("define('APP_ASSET_VERSION', '20260703-person-table-cache-3');", "define('APP_ASSET_VERSION', '20260703-person-table-admin-4');")
          index.write_text(text, encoding='utf-8')

          path = Path('assets/js/admin.js')
          text = path.read_text(encoding='utf-8')
          pattern = r"\+ '<td>' \+ safe\(row\.household_code \|\| ''\) \+ '</td>'\n\s*\+ '<td>' \+ safe\(relationshipOf\(row\)\) \+ '</td>'\n\s*\+ '<td>' \+ safe\(row\.citizen_code \|\| ''\) \+ '</td>'\n\s*\+ '<td><button class=\\\"btn btn-link person-name-link\\\" onclick=\\\"showPerson\(' \+ Number\(row\.id \|\| 0\) \+ '\)\\\">' \+ safe\(row\.full_name \|\| ''\) \+ '</button></td>'\n\s*\+ '<td>' \+ fmtDate\(row\.date_of_birth\) \+ '</td>'"
          replacement = "+ '<td>' + safe(row.household_code || '') + '</td>'\n        + '<td>' + safe(row.person_code || row.citizen_code || '') + '</td>'\n        + '<td><button class=\"btn btn-link person-name-link\" onclick=\"showPerson(' + Number(row.id || 0) + ')\">' + safe(row.full_name || '') + '</button></td>'\n        + '<td>' + safe(relationshipOf(row)) + '</td>'\n        + '<td>' + fmtDate(row.date_of_birth) + '</td>'"
          new_text, count = re.subn(pattern, replacement, text, count=1)
          if count != 1:
              raise SystemExit('admin.js personRow block was not matched')
          path.write_text(new_text, encoding='utf-8')
          PY
      - name: Commit source changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.php assets/js/admin.js
          git diff --cached --quiet && exit 0
          git commit -m "Fix admin person row column order"
          git push
