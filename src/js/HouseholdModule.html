<script>
(function() {
  var state = { page: 1, pageSize: 20, keyword: '', status: '' };
  var householdFields = [
    { name: 'householdCode', label: 'Mã hộ', required: true },
    { name: 'headCitizenName', label: 'Tên chủ hộ', required: true },
    { name: 'address', label: 'Địa chỉ/Thôn', required: true },
    { name: 'phone', label: 'Số điện thoại' },
    { name: 'areaCode', label: 'Khu vực' },
    { name: 'memberCount', label: 'Số nhân khẩu', type: 'number' },
    { name: 'isPolicyFamily', label: 'Gia đình có công', type: 'select', options: ['Không', 'Có'] },
    { name: 'isPoorHousehold', label: 'Hộ nghèo', type: 'select', options: ['Không', 'Có'] },
    { name: 'isNearPoorHousehold', label: 'Hộ cận nghèo', type: 'select', options: ['Không', 'Có'] },
    { name: 'hasDisabledMember', label: 'Có người tàn tật', type: 'select', options: ['Không', 'Có'] },
    { name: 'status', label: 'Trạng thái', type: 'select', options: [{ value: 'ACTIVE', label: 'Đang hoạt động' }, { value: 'INACTIVE', label: 'Tạm ngưng' }] },
    { name: 'note', label: 'Ghi chú', type: 'textarea' }
  ];

  function $(id) { return document.getElementById(id); }
  function html(value) {
    return String(value === undefined || value === null ? '' : value).replace(/[&<>\"]/g, function(s) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '\"': '&quot;' }[s];
    });
  }
  function valueOf(row, keys) {
    for (var i = 0; i < keys.length; i += 1) {
      if (row && row[keys[i]] !== undefined && row[keys[i]] !== null && row[keys[i]] !== '') return row[keys[i]];
    }
    return '';
  }
  function debounce(fn, wait) {
    var timer;
    return function() {
      var args = arguments;
      clearTimeout(timer);
      timer = setTimeout(function() { fn.apply(null, args); }, wait);
    };
  }
  function api(action, payload) {
    return new Promise(function(resolve, reject) {
      google.script.run.withSuccessHandler(function(response) {
        if (!response) {
          reject(new Error('Không nhận được phản hồi từ hệ thống'));
          return;
        }
        if (response.ok === false) {
          reject(new Error(response.error && response.error.message ? response.error.message : 'Thao tác không thành công'));
          return;
        }
        resolve(response.data !== undefined ? response.data : response);
      }).withFailureHandler(function(error) {
        reject(new Error(error && error.message ? error.message : 'Lỗi hệ thống'));
      }).api(action, payload || {});
    });
  }
  function toast(message, type) {
    var cls = type || 'info';
    var box = document.createElement('div');
    box.className = 'alert alert-' + cls + ' position-fixed';
    box.style.cssText = 'right:16px;top:72px;z-index:2000;min-width:260px;box-shadow:0 10px 25px rgba(0,0,0,.16)';
    box.textContent = message;
    document.body.appendChild(box);
    setTimeout(function() { box.remove(); }, 3500);
  }
  function activate() {
    document.querySelectorAll('[data-route]').forEach(function(item) {
      item.classList.toggle('active', item.getAttribute('data-route') === 'household');
    });
    var title = $('pageTitle');
    if (title) title.textContent = 'Hộ dân';
  }
  function statusBadge(value) {
    if (value === 'INACTIVE') return '<span class="badge badge-secondary">Tạm ngưng</span>';
    return '<span class="badge badge-success">Đang hoạt động</span>';
  }
  function yes(value) {
    return value === true || value === 'Có' || value === 'YES' || value === 'TRUE' || value === 1 || value === '1';
  }
  function policies(row) {
    var result = [];
    if (yes(row.isPolicyFamily)) result.push('Gia đình có công');
    if (yes(row.isPoorHousehold)) result.push('Hộ nghèo');
    if (yes(row.isNearPoorHousehold)) result.push('Hộ cận nghèo');
    if (yes(row.hasDisabledMember)) result.push('Tàn tật');
    return result.length ? result.map(function(item) { return '<span class="badge badge-info mr-1">' + html(item) + '</span>'; }).join('') : '<span class="text-muted">-</span>';
  }
  function birthYear(value) {
    var text = String(value || '');
    var match = text.match(/(19|20)\d{2}/);
    return match ? match[0] : '';
  }
  function normalizePage(result) {
    result = result || {};
    var items = Array.isArray(result.items) ? result.items : [];
    return {
      items: items,
      page: Number(result.page || state.page || 1),
      pageSize: Number(result.pageSize || state.pageSize || items.length || 20),
      total: Number(result.total || items.length || 0),
      totalPages: Number(result.totalPages || Math.max(1, Math.ceil((result.total || items.length || 0) / (result.pageSize || state.pageSize || 20))))
    };
  }
  function renderPager(page) {
    return '<div class="d-flex justify-content-between align-items-center mt-3 flex-wrap">'
      + '<div class="text-muted">Tổng cộng ' + html(page.total) + ' hộ dân</div>'
      + '<div class="btn-group btn-group-sm">'
      + '<button class="btn btn-outline-secondary" id="householdPrev" ' + (page.page <= 1 ? 'disabled' : '') + '><i class="fas fa-chevron-left"></i></button>'
      + '<button class="btn btn-outline-secondary" disabled>Trang ' + html(page.page) + '/' + html(page.totalPages) + '</button>'
      + '<button class="btn btn-outline-secondary" id="householdNext" ' + (page.page >= page.totalPages ? 'disabled' : '') + '><i class="fas fa-chevron-right"></i></button>'
      + '</div></div>';
  }
  function renderShell() {
    activate();
    $('app').innerHTML = '<div class="module-toolbar">'
      + '<div class="filters">'
      + '<input id="householdKeyword2" class="form-control" placeholder="Tìm mã hộ, chủ hộ, địa chỉ/thôn, diện hộ">'
      + '<select id="householdStatus2" class="form-control"><option value="">Tất cả trạng thái</option><option value="ACTIVE">Đang hoạt động</option><option value="INACTIVE">Tạm ngưng</option></select>'
      + '<select id="householdPageSize2" class="form-control"><option>10</option><option selected>20</option><option>50</option><option>100</option></select>'
      + '</div><div class="actions"><button class="btn btn-primary btn-sm btn-material" id="householdCreate"><i class="fas fa-plus"></i> Thêm hộ</button></div></div>'
      + '<div id="householdGrid"></div>';
    $('householdKeyword2').value = state.keyword;
    $('householdStatus2').value = state.status;
    $('householdPageSize2').value = state.pageSize;
    $('householdCreate').onclick = function() { openForm('Thêm hộ dân', {}, createHousehold); };
    $('householdKeyword2').oninput = debounce(function() { state.keyword = this.value; state.page = 1; refresh(); }, 300);
    $('householdStatus2').onchange = function() { state.status = this.value; state.page = 1; refresh(); };
    $('householdPageSize2').onchange = function() { state.pageSize = parseInt(this.value, 10) || 20; state.page = 1; refresh(); };
    refresh();
  }
  function refresh() {
    var grid = $('householdGrid');
    if (!grid) return;
    grid.innerHTML = '<div class="text-muted p-3">Đang tải danh sách hộ dân...</div>';
    api('household.page', state).then(function(result) {
      var page = normalizePage(result);
      if (!page.items.length) {
        grid.innerHTML = '<div class="alert alert-info">Chưa có hộ dân phù hợp.</div>' + renderPager(page);
        bindPager(page);
        return;
      }
      grid.innerHTML = '<div class="table-responsive"><table class="table table-hover table-striped bg-white"><thead><tr>'
        + '<th>Mã hộ</th><th>Chủ hộ</th><th>Địa chỉ/Thôn</th><th>Điện thoại</th><th>Khu vực</th><th>Nhân khẩu</th><th>Diện hộ</th><th>Trạng thái</th><th class="text-right">Thao tác</th>'
        + '</tr></thead><tbody>' + page.items.map(function(row, index) {
          var id = html(row.id || row.householdCode || index);
          return '<tr class="household-member-row" data-household-index="' + index + '" style="cursor:pointer">'
            + '<td><strong>' + html(row.householdCode) + '</strong></td>'
            + '<td>' + html(row.headCitizenName) + '</td>'
            + '<td>' + html(row.address) + '</td>'
            + '<td>' + html(row.phone) + '</td>'
            + '<td>' + html(row.areaCode) + '</td>'
            + '<td>' + html(row.memberCount || 0) + '</td>'
            + '<td>' + policies(row) + '</td>'
            + '<td>' + statusBadge(row.status) + '</td>'
            + '<td class="text-right text-nowrap">'
            + '<button class="btn btn-outline-info btn-xs mr-1" title="Xem thành viên" data-household-view="' + id + '" data-household-index="' + index + '"><i class="fas fa-eye"></i></button>'
            + '<button class="btn btn-outline-primary btn-xs mr-1" title="Sửa" data-household-edit="' + id + '" data-household-index="' + index + '"><i class="fas fa-pen"></i></button>'
            + '<button class="btn btn-outline-danger btn-xs" title="Xóa" data-household-delete="' + id + '" data-household-index="' + index + '"><i class="fas fa-trash"></i></button>'
            + '</td></tr>';
        }).join('') + '</tbody></table></div>' + renderPager(page);
      bindRows(page.items);
      bindPager(page);
    }).catch(function(error) {
      grid.innerHTML = '<div class="alert alert-danger">Không tải được danh sách hộ dân: ' + html(error.message) + '</div>';
    });
  }
  function bindRows(items) {
    document.querySelectorAll('[data-household-index]').forEach(function(item) {
      item.onclick = function(event) {
        var action = event.target.closest('button');
        if (action) return;
        showMembers(items[Number(item.getAttribute('data-household-index'))]);
      };
    });
    document.querySelectorAll('[data-household-view]').forEach(function(btn) {
      btn.onclick = function(event) { event.stopPropagation(); showMembers(items[Number(btn.dataset.householdIndex)]); };
    });
    document.querySelectorAll('[data-household-edit]').forEach(function(btn) {
      btn.onclick = function(event) { event.stopPropagation(); openForm('Cập nhật hộ dân', items[Number(btn.dataset.householdIndex)], updateHousehold); };
    });
    document.querySelectorAll('[data-household-delete]').forEach(function(btn) {
      btn.onclick = function(event) {
        event.stopPropagation();
        var row = items[Number(btn.dataset.householdIndex)];
        if (!confirm('Xác nhận xóa mềm hộ dân này?')) return;
        api('household.delete', { id: row.id }).then(function() { toast('Đã xóa hộ dân', 'success'); refresh(); }).catch(function(error) { toast(error.message, 'danger'); });
      };
    });
  }
  function bindPager(page) {
    if ($('householdPrev')) $('householdPrev').onclick = function() { if (state.page > 1) { state.page -= 1; refresh(); } };
    if ($('householdNext')) $('householdNext').onclick = function() { if (state.page < page.totalPages) { state.page += 1; refresh(); } };
  }
  function showMembers(household) {
    var code = valueOf(household, ['householdCode', 'id']);
    if (!code) { toast('Hộ dân chưa có mã hộ để tra cứu thành viên', 'warning'); return; }
    showMemberModal(household, '<div class="text-muted p-3">Đang tải danh sách thành viên...</div>');
    api('person.safePage', { page: 1, pageSize: 100, householdId: code }).then(function(result) {
      var members = normalizePage(result).items;
      var body = '<div class="mb-2 text-muted">Mã hộ: <strong>' + html(code) + '</strong> - ' + html(members.length) + ' thành viên</div>';
      if (!members.length) {
        body += '<div class="alert alert-info">Chưa có nhân khẩu nào trùng mã hộ này.</div>';
      } else {
        body += '<div class="table-responsive"><table class="table table-sm table-striped table-hover"><thead><tr>'
          + '<th>Mã hộ</th><th>Mã nhân khẩu</th><th>Họ tên</th><th>Năm sinh</th><th>CCCD</th><th>Địa chỉ</th><th>Số điện thoại</th>'
          + '</tr></thead><tbody>' + members.map(function(person) {
            return '<tr>'
              + '<td>' + html(valueOf(person, ['householdCode', 'householdId']) || code) + '</td>'
              + '<td>' + html(valueOf(person, ['citizenCode', 'personCode', 'id'])) + '</td>'
              + '<td>' + html(valueOf(person, ['fullName', 'name'])) + '</td>'
              + '<td>' + html(birthYear(valueOf(person, ['dateOfBirth', 'birthDate', 'birthYear']))) + '</td>'
              + '<td>' + html(valueOf(person, ['identityNumber', 'cccd', 'nationalId'])) + '</td>'
              + '<td>' + html(valueOf(person, ['currentAddress', 'permanentAddress', 'address']) || household.address) + '</td>'
              + '<td>' + html(valueOf(person, ['phone', 'phoneNumber', 'mobile'])) + '</td>'
              + '</tr>';
          }).join('') + '</tbody></table></div>';
      }
      showMemberModal(household, body);
    }).catch(function(error) {
      showMemberModal(household, '<div class="alert alert-danger">Không tải được thành viên hộ: ' + html(error.message) + '</div>');
    });
  }
  function showMemberModal(household, body) {
    var code = valueOf(household, ['householdCode', 'id']);
    var old = $('householdMemberModal');
    if (old) old.remove();
    document.body.insertAdjacentHTML('beforeend', '<div class="modal fade" id="householdMemberModal" tabindex="-1" role="dialog">'
      + '<div class="modal-dialog modal-xl" role="document"><div class="modal-content">'
      + '<div class="modal-header"><h5 class="modal-title">Thành viên hộ ' + html(code) + '</h5><button type="button" class="close" data-dismiss="modal"><span>&times;</span></button></div>'
      + '<div class="modal-body">' + body + '</div>'
      + '<div class="modal-footer"><button type="button" class="btn btn-secondary" data-dismiss="modal">Đóng</button></div>'
      + '</div></div></div>');
    $('#householdMemberModal').modal('show');
  }
  function control(field, data) {
    var value = data[field.name];
    if (value === undefined || value === null || value === '') value = field.name === 'status' ? 'ACTIVE' : '';
    if (field.type === 'textarea') return '<textarea class="form-control" name="' + field.name + '" rows="3">' + html(value) + '</textarea>';
    if (field.type === 'select') {
      return '<select class="form-control" name="' + field.name + '">' + field.options.map(function(option) {
        var optionValue = typeof option === 'object' ? option.value : option;
        var optionLabel = typeof option === 'object' ? option.label : option;
        return '<option value="' + html(optionValue) + '" ' + (String(optionValue) === String(value) ? 'selected' : '') + '>' + html(optionLabel) + '</option>';
      }).join('') + '</select>';
    }
    return '<input class="form-control" type="' + html(field.type || 'text') + '" name="' + field.name + '" value="' + html(value) + '">';
  }
  function openForm(title, data, submitter) {
    var old = $('householdFormModal');
    if (old) old.remove();
    document.body.insertAdjacentHTML('beforeend', '<div class="modal fade" id="householdFormModal" tabindex="-1" role="dialog">'
      + '<div class="modal-dialog modal-lg" role="document"><form class="modal-content" id="householdForm">'
      + '<div class="modal-header"><h5 class="modal-title">' + html(title) + '</h5><button type="button" class="close" data-dismiss="modal"><span>&times;</span></button></div>'
      + '<div class="modal-body"><div class="form-grid">' + householdFields.map(function(field) {
        return '<div class="form-group ' + (field.type === 'textarea' ? 'full' : '') + '"><label>' + html(field.label) + (field.required ? ' <span class="text-danger">*</span>' : '') + '</label>' + control(field, data || {}) + '</div>';
      }).join('') + '</div></div>'
      + '<div class="modal-footer"><button type="button" class="btn btn-secondary" data-dismiss="modal">Hủy</button><button type="submit" class="btn btn-primary">Lưu</button></div>'
      + '</form></div></div>');
    $('householdForm').onsubmit = function(event) {
      event.preventDefault();
      var payload = {};
      householdFields.forEach(function(field) { payload[field.name] = $('householdForm').elements[field.name].value; });
      if (data && data.id) payload.id = data.id;
      try { validateHousehold(payload); } catch (error) { toast(error.message, 'warning'); return; }
      submitter(payload);
    };
    $('#householdFormModal').modal('show');
  }
  function validateHousehold(payload) {
    if (!String(payload.householdCode || '').trim()) throw new Error('Vui lòng nhập Mã hộ');
    if (!String(payload.headCitizenName || '').trim()) throw new Error('Vui lòng nhập Tên chủ hộ');
    if (!String(payload.address || '').trim()) throw new Error('Vui lòng nhập Địa chỉ/Thôn');
  }
  function createHousehold(payload) {
    api('household.create', payload).then(function() { $('#householdFormModal').modal('hide'); state.page = 1; toast('Đã thêm hộ dân', 'success'); refresh(); }).catch(function(error) { toast(error.message, 'danger'); });
  }
  function updateHousehold(payload) {
    api('household.update', payload).then(function() { $('#householdFormModal').modal('hide'); toast('Đã cập nhật hộ dân', 'success'); refresh(); }).catch(function(error) { toast(error.message, 'danger'); });
  }
  document.addEventListener('click', function(event) {
    var link = event.target.closest('[data-route="household"]');
    if (!link) return;
    event.preventDefault();
    event.stopImmediatePropagation();
    renderShell();
  }, true);
  window.Thon09HouseholdModule = { render: renderShell, refresh: refresh };
})();
</script>
