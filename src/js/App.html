<script>
(function() {
  var state = {
    route: 'dashboard',
    dashboard: { fromDate: '', toDate: '', householdStatus: '', personStatus: '', residencyStatus: '' },
    household: { page: 1, pageSize: 20, keyword: '', status: '' },
    person: { page: 1, pageSize: 20, keyword: '', householdId: '', status: '', includeDeleted: false }
  };
  var charts = {};
  var dashboardTimer = null;
  var titles = {
    dashboard: 'Dashboard', household: 'Household', citizen: 'Citizen', movement: 'Movement', report: 'Report',
    pdf: 'PDF', backup: 'Backup', permission: 'Permission', user: 'User', logs: 'Logs'
  };

  function el(id) { return document.getElementById(id); }
  function html(value) { return String(value === undefined || value === null ? '' : value).replace(/[&<>"]/g, function(s) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]); }); }
  function debounce(fn, delay) { var timer; return function() { var args = arguments; clearTimeout(timer); timer = setTimeout(function() { fn.apply(null, args); }, delay || 250); }; }
  function setLoading(active) {
    var layer = el('loadingLayer');
    if (!layer) {
      layer = document.createElement('div'); layer.id = 'loadingLayer'; layer.className = 'loading-layer';
      layer.innerHTML = '<div class="spinner-border text-primary"></div>'; document.body.appendChild(layer);
    }
    layer.classList.toggle('active', !!active);
  }
  function toast(message, kind) {
    var host = document.querySelector('.toast-host') || document.body.appendChild(document.createElement('div'));
    host.className = 'toast-host';
    var node = document.createElement('div');
    node.className = 'alert alert-' + (kind || 'info') + ' shadow-sm';
    node.textContent = message;
    host.appendChild(node);
    setTimeout(function() { node.remove(); }, 3500);
  }
  function call(action, payload) {
    setLoading(true);
    return new Promise(function(resolve, reject) {
      google.script.run.withSuccessHandler(function(response) {
        setLoading(false);
        if (!response || !response.ok) reject(new Error(response && response.error ? response.error.message : 'Loi he thong'));
        else resolve(response.data);
      }).withFailureHandler(function(error) {
        setLoading(false); reject(error);
      }).api(action, payload || {});
    });
  }
  function mount(content) { el('app').innerHTML = content; }
  function setRoute(route) {
    if (dashboardTimer) { clearInterval(dashboardTimer); dashboardTimer = null; }
    Object.keys(charts).forEach(function(key) { charts[key].destroy(); });
    charts = {};
    state.route = route;
    el('pageTitle').textContent = titles[route] || route;
    document.querySelectorAll('[data-route]').forEach(function(item) { item.classList.toggle('active', item.getAttribute('data-route') === route); });
    routes[route]();
  }
  function status(value) { return '<span class="status-pill status-' + html(value) + '">' + html(value || '') + '</span>'; }
  function table(columns, rows, actions) {
    return '<div class="card"><div class="card-body table-responsive p-0"><table class="table table-hover table-sm mb-0"><thead><tr>' +
      columns.map(function(c) { return '<th>' + html(c.label) + '</th>'; }).join('') + (actions ? '<th></th>' : '') + '</tr></thead><tbody>' +
      (rows.length ? rows.map(function(row) { return '<tr>' + columns.map(function(c) { return '<td>' + (c.render ? c.render(row) : html(row[c.key])) + '</td>'; }).join('') + (actions ? '<td class="action-cell">' + actions(row) + '</td>' : '') + '</tr>'; }).join('') : '<tr><td colspan="' + (columns.length + (actions ? 1 : 0)) + '" class="text-center text-muted p-4">Khong co du lieu</td></tr>') +
      '</tbody></table></div></div>';
  }
  function toolbar(searchPlaceholder) {
    return '<div class="module-toolbar"><div class="filters"><input id="keyword" class="form-control form-control-sm" placeholder="' + html(searchPlaceholder || 'Tim kiem') + '"></div><div class="actions"><button class="btn btn-primary btn-sm btn-material" id="btnCreate"><i class="fas fa-plus"></i> Tao moi</button></div></div>';
  }
  function bindSubmit(formId, handler) {
    document.getElementById(formId).addEventListener('submit', function(event) {
      event.preventDefault();
      var payload = Array.from(event.target.elements).reduce(function(acc, input) {
        if (input.name) acc[input.name] = input.value;
        return acc;
      }, {});
      handler(payload);
    });
  }
  function modalForm(title, fields, values, onSubmit) {
    var id = 'modalForm';
    var body = '<form id="entityForm"><div class="form-grid">' + fields.map(function(field) {
      var cls = field.full ? ' full' : '';
      var type = field.type || 'text';
      return '<div class="form-group' + cls + '"><label>' + html(field.label) + '</label><input type="' + html(type) + '" class="form-control" name="' + html(field.name) + '" value="' + html((values || {})[field.name] || '') + '" ' + (field.required ? 'required' : '') + '></div>';
    }).join('') + '</div><button class="btn btn-primary btn-material" type="submit">Luu</button></form>';
    var markup = '<div class="modal fade" id="' + id + '" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">' + html(title) + '</h5><button type="button" class="close" data-dismiss="modal">&times;</button></div><div class="modal-body">' + body + '</div></div></div></div>';
    document.body.insertAdjacentHTML('beforeend', markup);
    $('#' + id).modal('show').on('hidden.bs.modal', function() { this.remove(); });
    bindSubmit('entityForm', function(payload) { onSubmit(payload); });
  }

  var fields = {
    household: [
      {name:'householdCode',label:'Ma ho',required:true}, {name:'address',label:'Dia chi/Thon',required:true},
      {name:'phone',label:'Dien thoai'}, {name:'areaCode',label:'Khu vuc'},
      {name:'headCitizenId',label:'ID chu ho'}, {name:'note',label:'Ghi chu',full:true}
    ],
    citizen: [
      {name:'citizenCode',label:'Ma nhan khau',required:true}, {name:'householdId',label:'ID ho',required:true},
      {name:'fullName',label:'Ho ten',required:true}, {name:'gender',label:'Gioi tinh',required:true},
      {name:'dateOfBirth',label:'Ngay sinh',required:true,type:'date'}, {name:'identityNumber',label:'CCCD/CMND'},
      {name:'identityIssueDate',label:'Ngay cap',type:'date'}, {name:'identityIssuePlace',label:'Noi cap'},
      {name:'relationship',label:'Quan he',required:true}, {name:'phone',label:'Dien thoai'},
      {name:'ethnicity',label:'Dan toc'}, {name:'religion',label:'Ton giao'},
      {name:'occupation',label:'Nghe nghiep'}, {name:'educationLevel',label:'Hoc van'},
      {name:'maritalStatus',label:'Hon nhan'}, {name:'permanentAddress',label:'Thuong tru',full:true},
      {name:'currentAddress',label:'Noi o hien nay',full:true}
    ],
    movement: [{name:'citizenId',label:'ID nhan khau',required:true},{name:'householdId',label:'ID ho'},{name:'type',label:'Loai bien dong',required:true},{name:'fromAddress',label:'Tu dia chi'},{name:'toAddress',label:'Den dia chi'},{name:'effectiveDate',label:'Ngay hieu luc',required:true,type:'date'},{name:'reason',label:'Ly do',full:true}]
  };

  function validateHousehold(payload) {
    if (!payload.householdCode || !/^[A-Za-z0-9._-]{2,30}$/.test(payload.householdCode)) throw new Error('Ma ho khong hop le');
    if (!payload.address || payload.address.trim().length < 2) throw new Error('Dia chi/Thon phai co it nhat 2 ky tu');
    if (payload.phone && !/^[0-9+() .-]{8,20}$/.test(payload.phone)) throw new Error('So dien thoai khong hop le');
  }
  function validatePerson(payload) {
    if (!payload.citizenCode || !/^[A-Za-z0-9._-]{2,30}$/.test(payload.citizenCode)) throw new Error('Ma nhan khau khong hop le');
    if (!payload.householdId) throw new Error('Can nhap ID ho');
    if (!payload.fullName || payload.fullName.trim().length < 2) throw new Error('Ho ten phai co it nhat 2 ky tu');
    if (!payload.gender) throw new Error('Can nhap gioi tinh');
    if (!payload.dateOfBirth) throw new Error('Can nhap ngay sinh');
    if (!payload.relationship) throw new Error('Can nhap quan he voi chu ho');
    if (payload.identityNumber && !/^\d{9}$|^\d{12}$/.test(payload.identityNumber)) throw new Error('CCCD/CMND phai gom 9 hoac 12 chu so');
    if (payload.phone && !/^[0-9+() .-]{8,20}$/.test(payload.phone)) throw new Error('So dien thoai khong hop le');
  }
  function renderPager(meta, totalLabel) {
    var disabledPrev = meta.page <= 1 ? ' disabled' : '';
    var disabledNext = meta.page >= meta.totalPages ? ' disabled' : '';
    return '<div class="pagination-bar"><div class="text-muted">Tong ' + html(meta.total) + ' ' + html(totalLabel || 'ban ghi') + '</div><div class="btn-group btn-group-sm">' +
      '<button class="btn btn-outline-secondary" id="pagePrev"' + disabledPrev + '><i class="fas fa-chevron-left"></i></button>' +
      '<button class="btn btn-outline-secondary" disabled>Trang ' + html(meta.page) + '/' + html(meta.totalPages) + '</button>' +
      '<button class="btn btn-outline-secondary" id="pageNext"' + disabledNext + '><i class="fas fa-chevron-right"></i></button>' +
      '</div></div>';
  }

  function chartData(items) {
    return { labels: items.map(function(item) { return item.label; }), values: items.map(function(item) { return item.value; }) };
  }
  function renderChart(id, type, items, colors) {
    var canvas = el(id);
    if (!canvas || !window.Chart) return;
    if (charts[id]) charts[id].destroy();
    var data = chartData(items || []);
    charts[id] = new Chart(canvas, {
      type: type,
      data: { labels: data.labels, datasets: [{ data: data.values, backgroundColor: colors, borderColor: '#ffffff', borderWidth: 2 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } }, scales: type === 'bar' ? { y: { beginAtZero: true, ticks: { precision: 0 } } } : {} }
    });
  }
  function metric(label, value, subtitle, icon, tone) {
    return '<div class="col-lg-3 col-md-6 col-12"><div class="dashboard-metric ' + html(tone || '') + '"><div><div class="metric-label">' + html(label) + '</div><div class="metric-value">' + html(value) + '</div><div class="metric-subtitle">' + html(subtitle || '') + '</div></div><i class="fas ' + html(icon || 'fa-chart-simple') + '"></i></div></div>';
  }

  function dashboardRoute() {
    mount('<div class="dashboard-filter"><div class="filters"><input type="date" id="dashFrom" class="form-control form-control-sm"><input type="date" id="dashTo" class="form-control form-control-sm"><select id="dashHouseholdStatus" class="form-control form-control-sm"><option value="">Tat ca ho</option><option value="ACTIVE">Ho dang hoat dong</option><option value="INACTIVE">Ho tam dung</option></select><select id="dashPersonStatus" class="form-control form-control-sm"><option value="">Tat ca nhan khau</option><option value="ACTIVE">Nhan khau hoat dong</option><option value="INACTIVE">Nhan khau khong hoat dong</option></select><select id="dashResidency" class="form-control form-control-sm"><option value="">Tat ca cu tru</option><option value="regular">Thuong tru</option><option value="temporaryResidence">Tam tru</option><option value="temporaryAbsence">Tam vang</option></select></div><button class="btn btn-outline-secondary btn-sm" id="dashRefresh"><i class="fas fa-rotate"></i></button></div><div id="dashboardMetrics" class="row"></div><div class="row"><div class="col-lg-4 col-12"><div class="card chart-card"><div class="card-header"><h3 class="card-title">Co cau gioi tinh</h3></div><div class="card-body"><canvas id="genderChart"></canvas></div></div></div><div class="col-lg-4 col-12"><div class="card chart-card"><div class="card-header"><h3 class="card-title">Co cau do tuoi</h3></div><div class="card-body"><canvas id="ageChart"></canvas></div></div></div><div class="col-lg-4 col-12"><div class="card chart-card"><div class="card-header"><h3 class="card-title">Tinh trang ho</h3></div><div class="card-body"><canvas id="householdChart"></canvas></div></div></div></div><div class="card"><div class="card-header"><h3 class="card-title">Bien dong gan day</h3><div class="card-tools"><span id="dashGeneratedAt" class="text-muted"></span></div></div><div class="card-body" id="recentMovementBox"></div></div>');
    el('dashFrom').value = state.dashboard.fromDate;
    el('dashTo').value = state.dashboard.toDate;
    el('dashHouseholdStatus').value = state.dashboard.householdStatus;
    el('dashPersonStatus').value = state.dashboard.personStatus;
    el('dashResidency').value = state.dashboard.residencyStatus;
    function readFilters() {
      state.dashboard.fromDate = el('dashFrom').value;
      state.dashboard.toDate = el('dashTo').value;
      state.dashboard.householdStatus = el('dashHouseholdStatus').value;
      state.dashboard.personStatus = el('dashPersonStatus').value;
      state.dashboard.residencyStatus = el('dashResidency').value;
      return Object.assign({}, state.dashboard);
    }
    function refresh() {
      call('dashboard.summary', readFilters()).then(function(data) {
        var metrics = data.metrics || {};
        el('dashboardMetrics').innerHTML = metric('Tong so ho', metrics.households || 0, 'Suc chua ' + data.capacity.households, 'fa-house-user', 'tone-blue') + metric('Tong nhan khau', metrics.citizens || 0, 'Dang hoat dong ' + (metrics.activeCitizens || 0), 'fa-users', 'tone-teal') + metric('Nam', metrics.male || 0, 'Tam tru ' + (metrics.temporaryResidence || 0), 'fa-mars', 'tone-indigo') + metric('Nu', metrics.female || 0, 'Tam vang ' + (metrics.temporaryAbsence || 0), 'fa-venus', 'tone-rose');
        renderChart('genderChart', 'doughnut', data.charts.population, ['#1565c0', '#c2185b', '#607d8b']);
        renderChart('ageChart', 'bar', data.charts.ages, ['#00897b', '#26a69a', '#4db6ac', '#80cbc4', '#b2dfdb', '#90a4ae']);
        renderChart('householdChart', 'doughnut', data.charts.households, ['#2e7d32', '#f9a825', '#c62828', '#78909c']);
        el('recentMovementBox').innerHTML = table([{key:'type',label:'Loai'},{key:'effectiveDate',label:'Ngay'},{key:'reason',label:'Ly do'},{key:'status',label:'Trang thai',render:function(r){return status(r.status);}}], data.recentMovements || []);
        el('dashGeneratedAt').textContent = data.generatedAt || '';
      }).catch(function(e) { toast(e.message, 'danger'); });
    }
    ['dashFrom','dashTo','dashHouseholdStatus','dashPersonStatus','dashResidency'].forEach(function(id) { el(id).onchange = refresh; });
    el('dashRefresh').onclick = refresh;
    refresh();
    dashboardTimer = setInterval(function() { if (state.route === 'dashboard') refresh(); }, 60000);
  }

  function householdRoute() {
    mount('<div class="module-toolbar"><div class="filters"><input id="householdKeyword" class="form-control form-control-sm" placeholder="Tim ma ho, dia chi/thon, dien thoai"><select id="householdStatus" class="form-control form-control-sm"><option value="">Tat ca trang thai</option><option value="ACTIVE">ACTIVE</option><option value="INACTIVE">INACTIVE</option></select><select id="householdPageSize" class="form-control form-control-sm"><option>10</option><option selected>20</option><option>50</option><option>100</option></select></div><div class="actions"><button class="btn btn-primary btn-sm btn-material" id="btnCreate"><i class="fas fa-plus"></i> Them ho</button></div></div><div id="grid"></div>');
    el('householdKeyword').value = state.household.keyword; el('householdStatus').value = state.household.status; el('householdPageSize').value = state.household.pageSize;
    function refresh() {
      call('household.page', state.household).then(function(result) {
        var columns = [{key:'householdCode',label:'Ma ho'}, {key:'address',label:'Dia chi/Thon'}, {key:'phone',label:'Dien thoai'}, {key:'areaCode',label:'Khu vuc'}, {key:'memberCount',label:'Nhan khau'}, {key:'status',label:'Trang thai',render:function(r){return status(r.status);}}];
        el('grid').innerHTML = table(columns, result.items, function(row) { return '<button class="btn btn-outline-primary btn-xs" title="Sua" data-edit="' + html(row.id) + '"><i class="fas fa-pen"></i></button> <button class="btn btn-outline-danger btn-xs" title="Xoa" data-delete="' + html(row.id) + '"><i class="fas fa-trash"></i></button>'; }) + renderPager(result, 'ho dan');
        document.querySelectorAll('[data-edit]').forEach(function(btn) { btn.onclick = function() { var row = result.items.filter(function(item) { return item.id === btn.dataset.edit; })[0]; modalForm('Cap nhat ho dan', fields.household, row, function(payload) { try { validateHousehold(payload); } catch (err) { toast(err.message, 'warning'); return; } payload.id = row.id; call('household.update', payload).then(function(){ $('#modalForm').modal('hide'); toast('Da cap nhat ho dan','success'); refresh(); }).catch(function(e){ toast(e.message,'danger'); }); }); }; });
        document.querySelectorAll('[data-delete]').forEach(function(btn) { btn.onclick = function() { if (!confirm('Xac nhan xoa mem ho dan nay?')) return; call('household.delete', { id: btn.dataset.delete }).then(function(){ toast('Da xoa ho dan','success'); refresh(); }).catch(function(e){ toast(e.message,'danger'); }); }; });
        if (el('pagePrev')) el('pagePrev').onclick = function() { if (state.household.page > 1) { state.household.page -= 1; refresh(); } };
        if (el('pageNext')) el('pageNext').onclick = function() { if (state.household.page < result.totalPages) { state.household.page += 1; refresh(); } };
      }).catch(function(e) { toast(e.message, 'danger'); });
    }
    el('btnCreate').onclick = function() { modalForm('Them ho dan', fields.household, {}, function(payload) { try { validateHousehold(payload); } catch (err) { toast(err.message, 'warning'); return; } call('household.create', payload).then(function(){ $('#modalForm').modal('hide'); state.household.page = 1; toast('Da them ho dan','success'); refresh(); }).catch(function(e){ toast(e.message,'danger'); }); }); };
    el('householdKeyword').oninput = debounce(function() { state.household.keyword = this.value; state.household.page = 1; refresh(); }, 300);
    el('householdStatus').onchange = function() { state.household.status = this.value; state.household.page = 1; refresh(); };
    el('householdPageSize').onchange = function() { state.household.pageSize = parseInt(this.value, 10); state.household.page = 1; refresh(); };
    refresh();
  }

  function personRoute() {
    mount('<div class="module-toolbar"><div class="filters"><input id="personKeyword" class="form-control form-control-sm" placeholder="Tim ho ten, ma, CCCD, dien thoai"><input id="personHousehold" class="form-control form-control-sm" placeholder="ID ho"><select id="personStatus" class="form-control form-control-sm"><option value="">Tat ca trang thai</option><option value="ACTIVE">ACTIVE</option><option value="INACTIVE">INACTIVE</option><option value="DELETED">DELETED</option></select><select id="personPageSize" class="form-control form-control-sm"><option>10</option><option selected>20</option><option>50</option><option>100</option></select></div><div class="actions"><button class="btn btn-primary btn-sm btn-material" id="btnCreate"><i class="fas fa-plus"></i> Them nhan khau</button></div></div><div id="grid"></div>');
    el('personKeyword').value = state.person.keyword; el('personHousehold').value = state.person.householdId; el('personStatus').value = state.person.status; el('personPageSize').value = state.person.pageSize;
    function refresh() {
      state.person.includeDeleted = state.person.status === 'DELETED';
      call('person.page', state.person).then(function(result) {
        var columns = [{key:'citizenCode',label:'Ma'}, {key:'fullName',label:'Ho ten'}, {key:'identityNumber',label:'CCCD/CMND'}, {key:'householdId',label:'ID ho'}, {key:'gender',label:'Gioi tinh'}, {key:'dateOfBirth',label:'Ngay sinh'}, {key:'relationship',label:'Quan he'}, {key:'phone',label:'Dien thoai'}, {key:'status',label:'Trang thai',render:function(r){return status(r.status);}}];
        el('grid').innerHTML = table(columns, result.items, function(row) {
          var edit = '<button class="btn btn-outline-primary btn-xs" title="Sua" data-person-edit="' + html(row.id) + '"><i class="fas fa-pen"></i></button>';
          var del = '<button class="btn btn-outline-danger btn-xs" title="Xoa" data-person-delete="' + html(row.id) + '"><i class="fas fa-trash"></i></button>';
          var restore = '<button class="btn btn-outline-success btn-xs" title="Khoi phuc" data-person-restore="' + html(row.id) + '"><i class="fas fa-rotate-left"></i></button>';
          return row.status === 'DELETED' ? restore : edit + ' ' + del;
        }) + renderPager(result, 'nhan khau');
        document.querySelectorAll('[data-person-edit]').forEach(function(btn) { btn.onclick = function() { var row = result.items.filter(function(item) { return item.id === btn.dataset.personEdit; })[0]; modalForm('Cap nhat nhan khau', fields.citizen, row, function(payload) { try { validatePerson(payload); } catch (err) { toast(err.message, 'warning'); return; } payload.id = row.id; call('person.update', payload).then(function(){ $('#modalForm').modal('hide'); toast('Da cap nhat nhan khau','success'); refresh(); }).catch(function(e){ toast(e.message,'danger'); }); }); }; });
        document.querySelectorAll('[data-person-delete]').forEach(function(btn) { btn.onclick = function() { if (!confirm('Xac nhan xoa mem nhan khau nay?')) return; call('person.delete', { id: btn.dataset.personDelete }).then(function(){ toast('Da xoa nhan khau','success'); refresh(); }).catch(function(e){ toast(e.message,'danger'); }); }; });
        document.querySelectorAll('[data-person-restore]').forEach(function(btn) { btn.onclick = function() { call('person.restore', { id: btn.dataset.personRestore }).then(function(){ toast('Da khoi phuc nhan khau','success'); state.person.status = ''; state.person.includeDeleted = false; refresh(); }).catch(function(e){ toast(e.message,'danger'); }); }; });
        if (el('pagePrev')) el('pagePrev').onclick = function() { if (state.person.page > 1) { state.person.page -= 1; refresh(); } };
        if (el('pageNext')) el('pageNext').onclick = function() { if (state.person.page < result.totalPages) { state.person.page += 1; refresh(); } };
      }).catch(function(e) { toast(e.message, 'danger'); });
    }
    el('btnCreate').onclick = function() { modalForm('Them nhan khau', fields.citizen, {}, function(payload) { try { validatePerson(payload); } catch (err) { toast(err.message, 'warning'); return; } call('person.create', payload).then(function(){ $('#modalForm').modal('hide'); state.person.page = 1; toast('Da them nhan khau','success'); refresh(); }).catch(function(e){ toast(e.message,'danger'); }); }); };
    el('personKeyword').oninput = debounce(function() { state.person.keyword = this.value; state.person.page = 1; refresh(); }, 300);
    el('personHousehold').oninput = debounce(function() { state.person.householdId = this.value; state.person.page = 1; refresh(); }, 300);
    el('personStatus').onchange = function() { state.person.status = this.value; };
    el('personPageSize').onchange = function() { state.person.pageSize = parseInt(this.value, 10); state.person.page = 1; refresh(); };
    refresh();
  }

  function loadCrud(listAction, createAction, updateAction, deleteAction, columns, formFields) {
    mount(toolbar() + '<div id="grid"></div>');
    function refresh(filters) {
      call(listAction, filters || {}).then(function(rows) {
        el('grid').innerHTML = table(columns, rows, function(row) { return '<button class="btn btn-outline-primary btn-xs" data-edit="' + html(row.id) + '"><i class="fas fa-pen"></i></button> <button class="btn btn-outline-danger btn-xs" data-delete="' + html(row.id) + '"><i class="fas fa-trash"></i></button>'; });
        document.querySelectorAll('[data-edit]').forEach(function(btn) { btn.onclick = function() { var row = rows.filter(function(item) { return item.id === btn.dataset.edit; })[0]; modalForm('Cap nhat', formFields, row, function(payload) { payload.id = row.id; call(updateAction, payload).then(function(){ $('#modalForm').modal('hide'); toast('Da cap nhat','success'); refresh(); }).catch(function(e){ toast(e.message,'danger'); }); }); }; });
        document.querySelectorAll('[data-delete]').forEach(function(btn) { btn.onclick = function() { if (confirm('Xac nhan xoa mem ban ghi?')) call(deleteAction, { id: btn.dataset.delete }).then(function(){ toast('Da xoa','success'); refresh(); }).catch(function(e){ toast(e.message,'danger'); }); }; });
      }).catch(function(e) { toast(e.message, 'danger'); });
    }
    el('btnCreate').onclick = function() { modalForm('Tao moi', formFields, {}, function(payload) { call(createAction, payload).then(function(){ $('#modalForm').modal('hide'); toast('Da tao moi','success'); refresh(); }).catch(function(e){ toast(e.message,'danger'); }); }); };
    el('keyword').oninput = debounce(function() { refresh({ fullName: this.value, citizenCode: this.value }); }, 300);
    refresh();
  }

  var routes = {
    dashboard: dashboardRoute,
    household: householdRoute,
    citizen: personRoute,
    movement: function() { loadCrud('movement.list','movement.create','movement.update','movement.delete',[{key:'type',label:'Loai'},{key:'citizenId',label:'Nhan khau'},{key:'effectiveDate',label:'Ngay'},{key:'reason',label:'Ly do'},{key:'status',label:'Trang thai',render:function(r){return status(r.status);}}], fields.movement); },
    report: function() { call('report.households').then(function(rows){ mount(table([{key:'householdCode',label:'Ma ho'},{key:'address',label:'Dia chi/Thon'},{key:'memberCount',label:'So thanh vien'},{key:'status',label:'Trang thai',render:function(r){return status(r.status);}}], rows)); }).catch(function(e){ toast(e.message,'danger'); }); },
    pdf: function() { mount('<div class="card"><div class="card-body"><form id="pdfForm" class="form-inline"><input class="form-control mr-2" name="citizenId" placeholder="ID nhan khau" required><button class="btn btn-danger btn-material"><i class="fas fa-file-pdf"></i> Xuat PDF</button></form><div id="pdfResult" class="mt-3"></div></div></div>'); bindSubmit('pdfForm', function(p){ call('pdf.citizen', p).then(function(file){ el('pdfResult').innerHTML = '<a target="_blank" href="' + html(file.url) + '">' + html(file.name) + '</a>'; }).catch(function(e){ toast(e.message,'danger'); }); }); },
    backup: function() { mount('<div class="module-toolbar"><button id="btnBackup" class="btn btn-primary btn-material"><i class="fas fa-database"></i> Tao backup</button></div><div id="grid"></div>'); el('btnBackup').onclick = function(){ call('backup.create', {}).then(function(){ toast('Da tao backup','success'); routes.backup(); }).catch(function(e){ toast(e.message,'danger'); }); }; call('backup.list').then(function(rows){ el('grid').innerHTML = table([{key:'timestamp',label:'Thoi gian'},{key:'fileName',label:'Ten file'},{key:'createdBy',label:'Nguoi tao'},{key:'status',label:'Trang thai',render:function(r){return status(r.status);}}], rows); }); },
    permission: function() { call('permission.list').then(function(rows){ mount(table([{key:'role',label:'Vai tro'},{key:'module',label:'Module'},{key:'action',label:'Hanh dong'},{key:'allowed',label:'Cho phep'}], rows)); }); },
    user: function() { call('user.list').then(function(rows){ mount(table([{key:'email',label:'Email'},{key:'displayName',label:'Ten'},{key:'role',label:'Vai tro'},{key:'status',label:'Trang thai',render:function(r){return status(r.status);}}], rows)); }); },
    logs: function() { call('logs.list').then(function(rows){ mount(table([{key:'timestamp',label:'Thoi gian'},{key:'actorEmail',label:'Nguoi dung'},{key:'module',label:'Module'},{key:'action',label:'Hanh dong'},{key:'level',label:'Muc'},{key:'message',label:'Thong diep'}], rows)); }); }
  };

  document.addEventListener('click', function(event) { var link = event.target.closest('[data-route]'); if (link) { event.preventDefault(); setRoute(link.getAttribute('data-route')); } });
  call('user.me').then(function(user) { el('currentUser').textContent = user.email + ' | ' + user.role; }).catch(function() {});
  setRoute('dashboard');
})();
</script>
