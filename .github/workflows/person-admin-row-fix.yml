name: Person admin row fix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/person-admin-row-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix admin person row mapping
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          index = Path('index.php')
          text = index.read_text(encoding='utf-8')
          text = text.replace("define('APP_ASSET_VERSION', '20260703-person-table-cache-3');", "define('APP_ASSET_VERSION', '20260703-person-table-admin-4');")
          index.write_text(text, encoding='utf-8')

          path = Path('assets/js/admin.js')
          lines = path.read_text(encoding='utf-8').splitlines()
          replacement = [
              "        + '<td>' + safe(row.household_code || '') + '</td>'",
              "        + '<td>' + safe(row.person_code || row.citizen_code || '') + '</td>'",
              "        + '<td><button class=\"btn btn-link person-name-link\" onclick=\"showPerson(' + Number(row.id || 0) + ')\">' + safe(row.full_name || '') + '</button></td>'",
              "        + '<td>' + safe(relationshipOf(row)) + '</td>'",
              "        + '<td>' + fmtDate(row.date_of_birth) + '</td>'",
          ]
          changed = False
          for i, line in enumerate(lines):
              if "+ '<td>' + safe(row.household_code || '') + '</td>'" in line:
                  block = '\n'.join(lines[i:i+5])
                  if 'relationshipOf(row)' in block and 'row.citizen_code' in block and 'row.full_name' in block:
                      lines[i:i+5] = replacement
                      changed = True
                      break
          if not changed:
              raise SystemExit('admin.js personRow block was not matched')
          path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
      - name: Commit source changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.php assets/js/admin.js
          git diff --cached --quiet && exit 0
          git commit -m "Fix admin person row column order"
          git push
