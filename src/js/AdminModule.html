<script>
(function() {
  var state = { route: '', users: [], roles: [], permissions: [], logs: { page: 1, pageSize: 50 }, user: { page: 1, pageSize: 10, totalPages: 1 } };
  var roleLabels = { SUPER_ADMIN: 'Quản trị tối cao', ADMIN: 'Quản trị viên', OFFICER: 'Cán bộ', VIEWER: 'Chỉ xem' };
  var statusLabels = { ACTIVE: 'Đang hoạt động', INACTIVE: 'Bị khóa', DELETED: 'Đã xóa' };
  var moduleLabels = { dashboard: 'Tổng quan', household: 'Hộ dân', citizen: 'Nhân khẩu', movement: 'Biến động', report: 'Báo cáo', pdf: 'PDF', backup: 'Sao lưu', permission: 'Phân quyền', user: 'Người dùng', logs: 'Nhật ký', settings: 'Cấu hình', import: 'Import dữ liệu' };
  var actionLabels = { read: 'Xem', create: 'Thêm mới', update: 'Cập nhật', delete: 'Xóa', export: 'Xuất dữ liệu', admin: 'Quản trị' };
  var levelLabels = { INFO: 'Thông tin', WARN: 'Cảnh báo', ERROR: 'Lỗi' };

  function el(id) { return document.getElementById(id); }
  function html(value) { return String(value === undefined || value === null ? '' : value).replace(/[&<>"]/g, function(s) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]); }); }
  function label(map, value) { return map[value] || value || ''; }
  function toast(message, kind) {
    var host = document.querySelector('.toast-host') || document.body.appendChild(document.createElement('div'));
    host.className = 'toast-host';
    var node = document.createElement('div');
    node.className = 'alert alert-' + (kind || 'info') + ' shadow-sm';
    node.textContent = message;
    host.appendChild(node);
    setTimeout(function() { node.remove(); }, 3500);
  }
  function setLoading(active) {
    var layer = el('loadingLayer');
    if (!layer) {
      layer = document.createElement('div');
      layer.id = 'loadingLayer';
      layer.className = 'loading-layer';
      layer.innerHTML = '<div class="spinner-border text-primary"></div>';
      document.body.appendChild(layer);
    }
    layer.classList.toggle('active', !!active);
  }
  function call(action, payload) {
    setLoading(true);
    return new Promise(function(resolve, reject) {
      google.script.run.withSuccessHandler(function(response) {
        setLoading(false);
        if (!response || !response.ok) reject(new Error(response && response.error ? response.error.message : 'Lỗi hệ thống'));
        else resolve(response.data);
      }).withFailureHandler(function(error) {
        setLoading(false);
        reject(error);
      }).api(action, payload || {});
    });
  }
  function activate(route, title) {
    state.route = route;
    document.querySelectorAll('[data-route]').forEach(function(item) { item.classList.toggle('active', item.getAttribute('data-route') === route); });
    if (el('pageTitle')) el('pageTitle').textContent = title;
  }
  function pill(status) { return '<span class="status-pill status-' + html(status || '') + '">' + html(label(statusLabels, status)) + '</span>'; }
  function options(items, selected, labels) {
    return items.map(function(item) {
      var value = item.code || item;
      var text = item.name || (labels ? label(labels, value) : item);
      return '<option value="' + html(value) + '"' + (value === selected ? ' selected' : '') + '>' + html(text) + '</option>';
    }).join('');
  }

  function userFilters() {
    return { page: state.user.page, pageSize: state.user.pageSize, keyword: el('userKeyword').value, role: el('userRole').value, status: el('userStatus').value };
  }
  function renderUser() {
    activate('user', 'Người dùng');
    el('app').innerHTML = '<div class="admin-shell"><div class="module-toolbar"><div class="filters"><input id="userKeyword" class="form-control form-control-sm" placeholder="Tìm email, tên, vai trò"><select id="userRole" class="form-control form-control-sm"><option value="">Tất cả vai trò</option></select><select id="userStatus" class="form-control form-control-sm"><option value="">Tất cả trạng thái</option><option value="ACTIVE">Đang hoạt động</option><option value="INACTIVE">Bị khóa</option><option value="DELETED">Đã xóa</option></select></div><div class="actions"><button id="btnUserSearch" class="btn btn-outline-secondary btn-sm" title="Tìm kiếm"><i class="fas fa-search"></i></button><button id="btnUserCreate" class="btn btn-primary btn-sm" title="Thêm người dùng"><i class="fas fa-user-plus"></i></button></div></div><div id="userFormHost"></div><div class="card"><div class="card-body table-responsive p-0"><table class="table table-sm table-hover mb-0"><thead><tr><th>Email</th><th>Tên</th><th>Vai trò</th><th>Trạng thái</th><th>Đăng nhập gần nhất</th><th>Thao tác</th></tr></thead><tbody id="userRows"></tbody></table></div><div id="userPager" class="pagination-bar"></div></div></div>';
    call('role.list').then(function(roles) {
      state.roles = roles || [];
      el('userRole').innerHTML = '<option value="">Tất cả vai trò</option>' + options(state.roles, '', roleLabels);
      el('btnUserSearch').onclick = function() { state.user.page = 1; loadUsers(); };
      el('btnUserCreate').onclick = function() { showUserForm(); };
      loadUsers();
    }).catch(function(error) { toast(error.message, 'danger'); });
  }
  function loadUsers() {
    call('user.page', userFilters()).then(function(result) {
      state.users = result.items || [];
      state.user.page = result.page;
      state.user.totalPages = result.totalPages;
      el('userRows').innerHTML = state.users.length ? state.users.map(function(user) {
        var locked = user.status !== 'ACTIVE';
        return '<tr><td>' + html(user.email) + '</td><td>' + html(user.displayName) + '</td><td>' + html(label(roleLabels, user.role)) + '</td><td>' + pill(user.status) + '</td><td>' + html(user.lastLoginAt) + '</td><td class="action-cell"><button class="btn btn-outline-primary btn-xs" title="Sửa" data-user-edit="' + html(user.id) + '"><i class="fas fa-pen"></i></button> <button class="btn btn-outline-warning btn-xs" title="Đổi mật khẩu" data-user-password="' + html(user.id) + '"><i class="fas fa-key"></i></button> ' + (locked ? '<button class="btn btn-outline-success btn-xs" title="Mở khóa" data-user-unlock="' + html(user.id) + '"><i class="fas fa-lock-open"></i></button>' : '<button class="btn btn-outline-danger btn-xs" title="Khóa" data-user-lock="' + html(user.id) + '"><i class="fas fa-lock"></i></button>') + ' <button class="btn btn-outline-danger btn-xs" title="Xóa" data-user-delete="' + html(user.id) + '"><i class="fas fa-trash"></i></button></td></tr>';
      }).join('') : '<tr><td colspan="6" class="text-center text-muted p-4">Không có người dùng</td></tr>';
      el('userPager').innerHTML = '<span>Trang ' + result.page + '/' + result.totalPages + ' - ' + result.total + ' người dùng</span><div><button id="btnUserPrev" class="btn btn-outline-secondary btn-sm" title="Trang trước"><i class="fas fa-chevron-left"></i></button> <button id="btnUserNext" class="btn btn-outline-secondary btn-sm" title="Trang sau"><i class="fas fa-chevron-right"></i></button></div>';
      el('btnUserPrev').disabled = result.page <= 1;
      el('btnUserNext').disabled = result.page >= result.totalPages;
      el('btnUserPrev').onclick = function() { state.user.page -= 1; loadUsers(); };
      el('btnUserNext').onclick = function() { state.user.page += 1; loadUsers(); };
      bindUserRows();
    }).catch(function(error) { toast(error.message, 'danger'); });
  }
  function bindUserRows() {
    document.querySelectorAll('[data-user-edit]').forEach(function(button) { button.onclick = function() { call('user.get', { id: button.getAttribute('data-user-edit') }).then(showUserForm).catch(function(error) { toast(error.message, 'danger'); }); }; });
    document.querySelectorAll('[data-user-lock]').forEach(function(button) { button.onclick = function() { call('user.lock', { id: button.getAttribute('data-user-lock') }).then(function() { toast('Đã khóa người dùng', 'success'); loadUsers(); }).catch(function(error) { toast(error.message, 'danger'); }); }; });
    document.querySelectorAll('[data-user-unlock]').forEach(function(button) { button.onclick = function() { call('user.unlock', { id: button.getAttribute('data-user-unlock') }).then(function() { toast('Đã mở khóa người dùng', 'success'); loadUsers(); }).catch(function(error) { toast(error.message, 'danger'); }); }; });
    document.querySelectorAll('[data-user-delete]').forEach(function(button) { button.onclick = function() { call('user.delete', { id: button.getAttribute('data-user-delete') }).then(function() { toast('Đã xóa người dùng', 'success'); loadUsers(); }).catch(function(error) { toast(error.message, 'danger'); }); }; });
    document.querySelectorAll('[data-user-password]').forEach(function(button) { button.onclick = function() { showPasswordForm(button.getAttribute('data-user-password')); }; });
  }
  function showUserForm(user) {
    user = user || { email: '', displayName: '', role: 'VIEWER', status: 'ACTIVE' };
    el('userFormHost').innerHTML = '<div class="card admin-editor"><div class="card-header"><strong>' + (user.id ? 'Sửa người dùng' : 'Thêm người dùng') + '</strong></div><div class="card-body"><div class="form-grid"><input id="formUserEmail" class="form-control" placeholder="Email" value="' + html(user.email) + '"><input id="formUserName" class="form-control" placeholder="Tên hiển thị" value="' + html(user.displayName) + '"><select id="formUserRole" class="form-control">' + options(state.roles, user.role, roleLabels) + '</select><select id="formUserStatus" class="form-control"><option value="ACTIVE">Đang hoạt động</option><option value="INACTIVE">Bị khóa</option></select><input id="formUserPassword" class="form-control" type="password" placeholder="Mật khẩu ứng dụng mới"></div></div><div class="card-footer text-right"><button id="btnUserCancel" class="btn btn-outline-secondary btn-sm">Hủy</button> <button id="btnUserSave" class="btn btn-primary btn-sm">Lưu</button></div></div>';
    el('formUserStatus').value = user.status === 'DELETED' ? 'INACTIVE' : user.status;
    el('btnUserCancel').onclick = function() { el('userFormHost').innerHTML = ''; };
    el('btnUserSave').onclick = function() {
      var payload = { id: user.id, email: el('formUserEmail').value, displayName: el('formUserName').value, role: el('formUserRole').value, status: el('formUserStatus').value };
      if (el('formUserPassword').value) payload.password = el('formUserPassword').value;
      call(user.id ? 'user.update' : 'user.create', payload).then(function() { toast('Đã lưu người dùng', 'success'); el('userFormHost').innerHTML = ''; loadUsers(); }).catch(function(error) { toast(error.message, 'danger'); });
    };
  }
  function showPasswordForm(id) {
    el('userFormHost').innerHTML = '<div class="card admin-editor"><div class="card-header"><strong>Đổi mật khẩu ứng dụng</strong></div><div class="card-body"><input id="changePasswordValue" class="form-control" type="password" placeholder="Mật khẩu mới tối thiểu 8 ký tự"></div><div class="card-footer text-right"><button id="btnPasswordCancel" class="btn btn-outline-secondary btn-sm">Hủy</button> <button id="btnPasswordSave" class="btn btn-primary btn-sm">Lưu</button></div></div>';
    el('btnPasswordCancel').onclick = function() { el('userFormHost').innerHTML = ''; };
    el('btnPasswordSave').onclick = function() { call('user.changePassword', { id: id, password: el('changePasswordValue').value }).then(function() { toast('Đã đổi mật khẩu', 'success'); el('userFormHost').innerHTML = ''; }).catch(function(error) { toast(error.message, 'danger'); }); };
  }

  function renderPermission() {
    activate('permission', 'Phân quyền');
    el('app').innerHTML = '<div class="module-toolbar"><div class="filters"><select id="permRole" class="form-control form-control-sm"><option value="">Tất cả vai trò</option><option value="ADMIN">Quản trị viên</option><option value="OFFICER">Cán bộ</option><option value="VIEWER">Chỉ xem</option></select><input id="permKeyword" class="form-control form-control-sm" placeholder="Module/Hành động"></div><button id="btnPermSearch" class="btn btn-outline-secondary btn-sm" title="Tìm kiếm"><i class="fas fa-search"></i></button></div><div class="card"><div class="card-body table-responsive p-0"><table class="table table-sm table-hover mb-0"><thead><tr><th>Vai trò</th><th>Module</th><th>Hành động</th><th>Cho phép</th><th>Thao tác</th></tr></thead><tbody id="permRows"></tbody></table></div></div>';
    el('btnPermSearch').onclick = loadPermissions;
    loadPermissions();
  }
  function loadPermissions() {
    call('permission.list').then(function(rows) {
      var role = el('permRole').value;
      var keyword = String(el('permKeyword').value || '').toLowerCase();
      state.permissions = (rows || []).filter(function(item) { return (!role || item.role === role) && (!keyword || [item.module, item.action].join(' ').toLowerCase().indexOf(keyword) >= 0); });
      el('permRows').innerHTML = state.permissions.map(function(item) { return '<tr><td>' + html(label(roleLabels, item.role)) + '</td><td>' + html(label(moduleLabels, item.module)) + '</td><td>' + html(label(actionLabels, item.action)) + '</td><td><select class="form-control form-control-sm" data-perm-value="' + html(item.id) + '"><option value="true"' + (String(item.allowed) === 'true' ? ' selected' : '') + '>Có</option><option value="false"' + (String(item.allowed) === 'false' ? ' selected' : '') + '>Không</option></select></td><td class="action-cell"><button class="btn btn-outline-primary btn-xs" title="Lưu" data-perm-save="' + html(item.id) + '"><i class="fas fa-save"></i></button></td></tr>'; }).join('') || '<tr><td colspan="5" class="text-center text-muted p-4">Không có quyền</td></tr>';
      document.querySelectorAll('[data-perm-save]').forEach(function(button) { button.onclick = function() { var id = button.getAttribute('data-perm-save'); call('permission.update', { id: id, allowed: document.querySelector('[data-perm-value="' + id + '"]').value }).then(function() { toast('Đã cập nhật quyền', 'success'); }).catch(function(error) { toast(error.message, 'danger'); }); }; });
    }).catch(function(error) { toast(error.message, 'danger'); });
  }

  function renderLogs() {
    activate('logs', 'Nhật ký hệ thống');
    el('app').innerHTML = '<div class="module-toolbar"><div class="filters"><input id="logKeyword" class="form-control form-control-sm" placeholder="Tìm nhật ký"><input id="logActor" class="form-control form-control-sm" placeholder="Email"><select id="logLevel" class="form-control form-control-sm"><option value="">Tất cả mức</option><option value="INFO">Thông tin</option><option value="WARN">Cảnh báo</option><option value="ERROR">Lỗi</option></select><input id="logModule" class="form-control form-control-sm" placeholder="Module"><input id="logAction" class="form-control form-control-sm" placeholder="Hành động"><input id="logFrom" type="date" class="form-control form-control-sm"><input id="logTo" type="date" class="form-control form-control-sm"></div><button id="btnLogSearch" class="btn btn-outline-secondary btn-sm" title="Tìm kiếm"><i class="fas fa-search"></i></button></div><div class="card"><div class="card-body table-responsive p-0"><table class="table table-sm table-hover mb-0"><thead><tr><th>Thời gian</th><th>Email</th><th>Module</th><th>Hành động</th><th>Mức</th><th>Nội dung</th></tr></thead><tbody id="logRows"></tbody></table></div><div id="logPager" class="pagination-bar"></div></div>';
    el('btnLogSearch').onclick = function() { state.logs.page = 1; loadLogs(); };
    loadLogs();
  }
  function loadLogs() {
    call('logs.search', { page: state.logs.page, pageSize: state.logs.pageSize, keyword: el('logKeyword').value, actorEmail: el('logActor').value, level: el('logLevel').value, module: el('logModule').value, action: el('logAction').value, fromDate: el('logFrom').value, toDate: el('logTo').value }).then(function(result) {
      el('logRows').innerHTML = result.items.length ? result.items.map(function(row) { return '<tr><td>' + html(row.timestamp) + '</td><td>' + html(row.actorEmail) + '</td><td>' + html(label(moduleLabels, row.module)) + '</td><td>' + html(label(actionLabels, row.action)) + '</td><td>' + html(label(levelLabels, row.level)) + '</td><td>' + html(row.message) + '</td></tr>'; }).join('') : '<tr><td colspan="6" class="text-center text-muted p-4">Không có nhật ký</td></tr>';
      el('logPager').innerHTML = '<span>Trang ' + result.page + '/' + result.totalPages + ' - ' + result.total + ' dòng</span><div><button id="btnLogPrev" class="btn btn-outline-secondary btn-sm" title="Trang trước"><i class="fas fa-chevron-left"></i></button> <button id="btnLogNext" class="btn btn-outline-secondary btn-sm" title="Trang sau"><i class="fas fa-chevron-right"></i></button></div>';
      el('btnLogPrev').disabled = result.page <= 1;
      el('btnLogNext').disabled = result.page >= result.totalPages;
      el('btnLogPrev').onclick = function() { state.logs.page -= 1; loadLogs(); };
      el('btnLogNext').onclick = function() { state.logs.page += 1; loadLogs(); };
    }).catch(function(error) { toast(error.message, 'danger'); });
  }

  function renderBackup() {
    activate('backup', 'Sao lưu dữ liệu');
    el('app').innerHTML = '<div class="module-toolbar"><div class="filters"><input id="backupNote" class="form-control form-control-sm" placeholder="Ghi chú sao lưu"><input id="restoreFileId" class="form-control form-control-sm" placeholder="File ID cần khôi phục"></div><div class="actions"><button id="btnBackupCreate" class="btn btn-primary btn-sm" title="Tạo sao lưu"><i class="fas fa-database"></i></button><button id="btnBackupDaily" class="btn btn-outline-primary btn-sm" title="Cấu hình sao lưu hằng ngày"><i class="fas fa-calendar-check"></i></button><button id="btnBackupRestore" class="btn btn-outline-danger btn-sm" title="Khôi phục"><i class="fas fa-rotate-left"></i></button></div></div><div class="card"><div class="card-body table-responsive p-0"><table class="table table-sm table-hover mb-0"><thead><tr><th>Thời gian</th><th>File</th><th>Người tạo</th><th>Ghi chú</th><th>Thao tác</th></tr></thead><tbody id="backupRows"></tbody></table></div></div>';
    el('btnBackupCreate').onclick = function() { call('backup.create', { note: el('backupNote').value }).then(function() { toast('Đã tạo bản sao lưu', 'success'); loadBackups(); }).catch(function(error) { toast(error.message, 'danger'); }); };
    el('btnBackupDaily').onclick = function() { call('backup.setupDaily').then(function() { toast('Đã cấu hình sao lưu hằng ngày', 'success'); }).catch(function(error) { toast(error.message, 'danger'); }); };
    el('btnBackupRestore').onclick = function() { restoreBackup(el('restoreFileId').value); };
    loadBackups();
  }
  function loadBackups() {
    call('backup.list').then(function(rows) {
      el('backupRows').innerHTML = rows.length ? rows.map(function(row) { return '<tr><td>' + html(row.timestamp) + '</td><td>' + html(row.fileName) + '<br><small>' + html(row.fileId) + '</small></td><td>' + html(row.createdBy) + '</td><td>' + html(row.note) + '</td><td class="action-cell"><button class="btn btn-outline-danger btn-xs" title="Khôi phục" data-restore="' + html(row.fileId) + '"><i class="fas fa-rotate-left"></i></button></td></tr>'; }).join('') : '<tr><td colspan="5" class="text-center text-muted p-4">Chưa có bản sao lưu</td></tr>';
      document.querySelectorAll('[data-restore]').forEach(function(button) { button.onclick = function() { restoreBackup(button.getAttribute('data-restore')); }; });
    }).catch(function(error) { toast(error.message, 'danger'); });
  }
  function restoreBackup(fileId) {
    if (!fileId) { toast('Cần nhập File ID bản sao lưu', 'warning'); return; }
    call('backup.restore', { fileId: fileId }).then(function() { toast('Đã khôi phục bản sao lưu. Vui lòng tải lại WebApp để dùng dữ liệu mới.', 'success'); loadBackups(); }).catch(function(error) { toast(error.message, 'danger'); });
  }

  function renderSettings() {
    activate('settings', 'Cấu hình hệ thống');
    el('app').innerHTML = '<div class="card admin-editor"><div class="card-header"><strong>Cấu hình hệ thống</strong></div><div class="card-body"><div class="form-grid"><input id="setUnitName" class="form-control" placeholder="Thông tin đơn vị"><input id="setHamletName" class="form-control" placeholder="Tên thôn"><input id="setSystemName" class="form-control" placeholder="Tên hệ thống"><select id="setBackupSchedule" class="form-control"><option value="DAILY">Sao lưu hằng ngày</option><option value="MANUAL">Sao lưu thủ công</option></select><input id="setReportSigner" class="form-control" placeholder="Người ký báo cáo"><input id="setSupportEmail" class="form-control" placeholder="Email hỗ trợ"><textarea id="setMaintenanceMessage" class="form-control full" rows="3" placeholder="Thông báo hệ thống"></textarea></div></div><div class="card-footer text-right"><button id="btnSettingsSave" class="btn btn-primary btn-sm"><i class="fas fa-save"></i> Lưu</button></div></div>';
    call('settings.get').then(function(settings) {
      el('setUnitName').value = settings.unitName || '';
      el('setHamletName').value = settings.hamletName || '';
      el('setSystemName').value = settings.systemName || '';
      el('setBackupSchedule').value = settings.backupSchedule || 'DAILY';
      el('setReportSigner').value = settings.reportSigner || '';
      el('setSupportEmail').value = settings.supportEmail || '';
      el('setMaintenanceMessage').value = settings.maintenanceMessage || '';
    }).catch(function(error) { toast(error.message, 'danger'); });
    el('btnSettingsSave').onclick = function() { call('settings.save', { unitName: el('setUnitName').value, hamletName: el('setHamletName').value, systemName: el('setSystemName').value, backupSchedule: el('setBackupSchedule').value, reportSigner: el('setReportSigner').value, supportEmail: el('setSupportEmail').value, maintenanceMessage: el('setMaintenanceMessage').value }).then(function() { toast('Đã lưu cấu hình', 'success'); }).catch(function(error) { toast(error.message, 'danger'); }); };
  }

  var handlers = { user: renderUser, permission: renderPermission, logs: renderLogs, backup: renderBackup, settings: renderSettings };
  document.addEventListener('click', function(event) {
    var link = event.target.closest('[data-route]');
    if (!link) return;
    var route = link.getAttribute('data-route');
    if (!handlers[route]) return;
    event.preventDefault();
    event.stopImmediatePropagation();
    handlers[route]();
  }, true);
})();
</script>
