name: Deploy to FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-ftp
  cancel-in-progress: false

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate production secrets
        shell: bash
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST || vars.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT || vars.DB_PORT }}
          DB_DATABASE: ${{ secrets.DB_DATABASE || vars.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME || vars.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_CHARSET: ${{ secrets.DB_CHARSET || vars.DB_CHARSET }}
        run: |
          missing=0
          for name in FTP_SERVER FTP_USERNAME FTP_PASSWORD DB_HOST DB_DATABASE DB_USERNAME DB_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is missing. Add it as a GitHub Actions secret, or add non-sensitive DB values as repository/environment variables. DB_PASSWORD must be a secret."
              missing=1
            fi
          done
          exit "$missing"

      - name: Create production env file
        shell: bash
        env:
          DB_HOST: ${{ secrets.DB_HOST || vars.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT || vars.DB_PORT }}
          DB_SOCKET: ${{ secrets.DB_SOCKET || vars.DB_SOCKET }}
          DB_DATABASE: ${{ secrets.DB_DATABASE || vars.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME || vars.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_CHARSET: ${{ secrets.DB_CHARSET || vars.DB_CHARSET }}
        run: |
          {
            echo "DB_HOST=${DB_HOST}"
            echo "DB_PORT=${DB_PORT:-3306}"
            if [ -n "${DB_SOCKET}" ]; then echo "DB_SOCKET=${DB_SOCKET}"; fi
            echo "DB_DATABASE=${DB_DATABASE}"
            echo "DB_USERNAME=${DB_USERNAME}"
            echo "DB_PASSWORD=${DB_PASSWORD}"
            echo "DB_CHARSET=${DB_CHARSET:-utf8mb4}"
          } > .deploy.env

      - name: Bust frontend asset cache
        shell: bash
        env:
          ASSET_VERSION: deploy-${{ github.run_number }}-${{ github.run_attempt }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ['ASSET_VERSION']
          index_path = Path('index.php')
          text = index_path.read_text(encoding='utf-8')
          updated = re.sub(
              r"define\('APP_ASSET_VERSION',\s*'[^']+'\);",
              f"define('APP_ASSET_VERSION', '{version}');",
              text,
              count=1,
          )
          if updated == text:
              raise SystemExit('APP_ASSET_VERSION was not found in index.php')
          index_path.write_text(updated, encoding='utf-8')
          print(f'Updated APP_ASSET_VERSION to {version}')
          PY

      - name: Build minimal production artifact
        run: npm run build:production

      - name: Deploy to hosting via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/production/
          server-dir: ./
          state-name: .ftp-deploy-sync-state-utf8.json
          exclude: |
            uploads/**
            !uploads/.htaccess
            storage/cache/**
            !storage/.htaccess
            backups/**
